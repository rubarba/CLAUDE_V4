armas.","choices":[],"autoTarget":363,"isFinal":false},"362":{"id":362,"text":"Confias que a negociação vence a raiva.\nPor um instante, parece que sim.\nMas a palavra “traição” corre mais rápido. Um dos teus atira uma pedra.\nA pedra acerta num inimigo. O inimigo responde com seta.\nE acabou.","choices":[],"autoTarget":363,"isFinal":false},"363":{"id":363,"text":"Diante do emissário.\nChegas ao estandarte com o alfaqui vivo.\nO soldado inimigo que te acompanhava desde a casa do homem da tinta afastou-se sem dizer palavra. Não olhou para trás. Talvez tenha voltado para os seus. Talvez tenha desaparecido na cidade. Não voltaste a vê-lo.\nO emissário olha para o velho, depois para ti, depois para o homem da tinta.\nO alfaqui fala primeiro:\n— Posso render-vos um bairro. Mas tem de haver regra: quem se rende vive. Quem saqueia é punido.\nO emissário chama um capitão:\n— Formem cordão. Protejam casas. Proíbam saque.\nO capitão obedece.\nO emissário vira-se para ti:\n— Tu vais com o alfaqui à linha inimiga e trazes-me a rendição. Se falhares, eu corto-te a cabeça antes que o rei acorde.","choices":[{"text":"vais com o alfaqui e o homem da tinta até à linha inimiga","target":365}],"autoTarget":null,"isFinal":false},"364":{"id":364,"text":"O alfaqui recusa.\n— Trouxeste-me para ver sangue. Não para evitar sangue.\nEle senta-se no chão, de costas contra a parede.\n— Vou esperar aqui. Se o rei quer a cidade, que venha ele.","choices":[],"autoTarget":365,"isFinal":false},"365":{"id":365,"text":"O grande teste.\nVais com o alfaqui e o homem da tinta pela rua que ainda cheira a sangue fresco.\nA linha inimiga está ali: homens cansados, olhos vermelhos, armas ainda levantadas.\nQuando o alfaqui aparece, um murmúrio corre.\nUm homem à frente — barba escura, olhar duro — avança.\nEle fala em árabe, rápido. O alfaqui responde. Depois vira-se para ti:\n— Ele diz que não confia no rei.\nO homem da tinta traduz-te, ao ouvido:\n— O alfaqui disse: “Não confies no rei. Confia na tua rua. Se hoje vives, amanhã decides.”\nO homem duro olha para trás, para as portas onde estão as famílias.\nEle volta-se e diz algo que parece condição.\nO alfaqui traduz:\n— Querem que tu sejas a prova.","choices":[{"text":"aceitas ficar com eles por uma hora como prova","target":368}],"autoTarget":null,"isFinal":false},"366":{"id":366,"text":"Pediste escolta extra.\nO emissário manda mais quatro homens. O inimigo vê “força”, não “acordo”.\nQuando chegam à linha, um arco levanta-se.\nO alfaqui fala para acalmar, mas a calma tem menos espaço.\nO homem duro diz algo e o homem da tinta traduz:\n— “Isto não é rendição. Isto é tomada.”","choices":[],"autoTarget":367,"isFinal":false},"367":{"id":367,"text":"Suspeitas de sabotagem.\nAntes de ires à linha, ficas de olho nos teus.\nVês um homem do teu lado a falar baixo com outro e a apontar discretamente para o alfaqui.\nQuando te vê, desvia o olhar.","choices":[{"text":"o confrontas já e tentas arrancar confissão","target":372}],"autoTarget":null,"isFinal":false},"368":{"id":368,"text":"Aceitas ser prova.\nO alfaqui olha-te, sério.\n— Se entrares… pode ser que não saias.\nTu respondes:\n— Já era para eu não sair da forca.\nCaminhas até à linha inimiga. Entregas a tua arma ao homem duro.\nEles abrem-te passagem. Entras numa rua do bairro. As portas fecham-se atrás de ti.\nVês homens a baixar armas lentamente. Vês medo. Vês esperança.\nO alfaqui fica do lado de fora. O homem da tinta fica na fronteira.\nTu és a prova… sozinho.\nO homem duro leva-te a uma casa vazia. Não te amarram.\nDo lado de fora, o som de armas a serem pousadas.\nA rendição está a acontecer.\nE então entra um fanático jovem, com uma faca na mão.","choices":[{"text":"tentas falar com ele e atrasar","target":374}],"autoTarget":null,"isFinal":false},"369":{"id":369,"text":"Outra prova.\nRecusas ser refém.\nO alfaqui fala em árabe ao homem duro. Depois vira-se para ti:\n— Eles aceitam prova se for visível e imediata.\nTu pedes ao emissário que venha. Propões:\nDocumento selado prometendo vida aos rendidos.\nUm cordão de homens do rei a impedir saque.\nUm sinal combinado para travar ataques.\nO homem duro hesita.\nE então, um dos teus grita:\n— Mentira!\nO que fazes?","choices":[],"autoTarget":370,"isFinal":false},"370":{"id":370,"text":"Exiges prova do lado deles.\nO homem duro ri-se.\n— Queres que eu baixe primeiro? Para me matarem?\n— Quero que me dês algo que prove que controlas os teus. Um homem. Uma arma. Um estandarte.\nO alfaqui traduz.\nO homem duro chama o fanático jovem e aponta:\n— Este não obedece. Queres prova? Leva-o.","choices":[],"autoTarget":371,"isFinal":false},"371":{"id":371,"text":"FINAL ALTERNATIVO — “A CIDADE NÃO APRENDE”\nForça em vez de acordo.\nA tua linha avança. A linha deles reage.\nA rua vira guerra outra vez.\nO alfaqui afasta-se, derrotado.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"372":{"id":372,"text":"Confrontas o suspeito.\nAproximas-te e apanhas-o pelo braço.\n— Vais estragar isto, não vais?\nEle tenta soltar-se.\n— A cidade vai cair de qualquer maneira. Eu só quero que caia… do meu jeito.\nEle tenta sacar lâmina.","choices":[],"autoTarget":373,"isFinal":false},"373":{"id":373,"text":"Vigilância discreta.\nO emissário manda dois homens discretos seguir o suspeito.\nTu voltas ao alfaqui:\n— Vamos.","choices":[],"autoTarget":374,"isFinal":false},"374":{"id":374,"text":"Tentas falar com o fanático.\nEle entra como lâmina com pernas.\nTu levantas as mãos devagar.\n— Se me matares, matas o teu bairro.\nEle ri, nervoso.\n— O meu bairro já está morto.\nA faca treme. Ele hesita.\nNão chega.","choices":[],"autoTarget":375,"isFinal":false},"375":{"id":375,"text":"A lâmina escondida.\nO fanático avança.\nTu puxas a lâmina da bota.\nEle tenta cortar-te a cara. Tu desvias. A tua lâmina entra-lhe no lado.\nEle cai.\nO barulho chama atenção. A porta abre-se. O homem duro entra, furioso.\nEle vê o corpo, vê a tua lâmina.\nTu falas primeiro:\n— Ele ia matar-me e matar o acordo.\nO homem duro olha para o corpo. Depois faz um gesto que não esperavas: baixa a cabeça.\nEle diz algo em árabe, pesado. Um dos outros homens sai a correr.\nLá fora, o som de armas a bater no chão.\nA rendição está a acontecer.","choices":[{"text":"pedes ao homem duro para te deixar sair e ires travar os teus","target":379}],"autoTarget":null,"isFinal":false},"376":{"id":376,"text":"Gritas pelo homem duro.\n— AGORA!\nO homem duro entra como tempestade. Bate no fanático com o cabo da arma.\nO fanático cai.\nO homem duro grita em árabe para os homens:\n— Parem!\nEle olha para ti:\n— Tu ficas vivo.\nLá fora, armas a baixar.","choices":[],"autoTarget":380,"isFinal":false},"377":{"id":377,"text":"Documento e sinal.\nO emissário manda selar o pergaminho. O selo de cera marca promessa de vida.\nO homem duro vê o selo e, mais importante, vê os homens do emissário a formar cordão e a impedir saque.\nO alfaqui fala em árabe, firme.\nO homem duro baixa a arma e dá ordem.\nLâminas a bater em pedra.\nRendição.\n[Anota: FAMA — PONTE. Mostraste que a palavra pode valer mais que a espada.]","choices":[],"autoTarget":380,"isFinal":false},"378":{"id":378,"text":"Levas o fanático como prova.\nAgarras no jovem pelo braço. Ele morde-te, cospe, tenta fugir.\nO homem duro observa.\n— Se ele morrer… não me interessa.\nTu puxas o fanático para trás da tua linha.","choices":[{"text":"proteges o fanático para o usar como prova viva","target":382}],"autoTarget":null,"isFinal":false},"379":{"id":379,"text":"Pediste para sair.\nO homem duro hesita.\n— Se sais agora e os teus nos atacam?\n— Não vão atacar. Eu vou travar.\nEle abre a porta.","choices":[],"autoTarget":380,"isFinal":false},"380":{"id":380,"text":"O sinal da rendição.\nUma tigela de barro parte-se num degrau e o som ecoa mais do que deveria. Há silêncio suficiente para ouvires vergonha.\nNota de cerco: há mais tochas do que havia há minutos; a noite está a ser varrida palmo a palmo.\n[GUARDA: PALAVRA DO ALFAQUI]\nO alfaqui sai para a rua fronteira e levanta as mãos.\nO homem da tinta repete em português e árabe: “ninguém ataca”.\nO emissário dá ordem:\n— Cordão. Agora.\nVês homens do teu lado a formar linha, a empurrar saqueadores para trás.\nO homem duro baixa a arma e manda baixar as dos seus.\nUma parte de Lisboa fica quieta.\nO emissário aproxima-se e olha-te.\n— Um bairro.\nO homem duro ouve e baixa o olhar.\n— Os outros vão chamar-nos traidores — murmura. — Isto não acaba aqui.\nAo longe, um corno toca — não do inimigo. Do teu lado. Sinal de avanço.\nAlguém está a tentar avançar noutra rua sem esperar por rendições.\nAlgures, uma criança chora. O alfaqui observa-te como quem mede um homem e decide se ele é porta… ou fogo.\nUm bairro rendeu-se sem gritos, sem metal a bater em metal. Apenas passos cautelosos e olhos baixos.\nO silêncio chega primeiro.","choices":[{"text":"segues com o emissário ao rei imediatamente","target":384},{"text":"continuas","target":381}],"autoTarget":null,"isFinal":false},"381":{"id":381,"text":"Há um silêncio estranho no bairro que cedeu — não paz, mas suspensão. Uma criança chora algures, fina como um fio; o alfaqui olha-te sem palavras, como se te medisse o peso da alma. O mundo não parou: só prendeu a respiração contigo.\nFicas dentro e confias.\nFicas. Esperas.\nLá fora, gritos. O medo sobe. Depois baixa.\nQuando finalmente te deixam sair, o acordo passou por um fio.","choices":[],"autoTarget":385,"isFinal":false},"382":{"id":382,"text":"Proteges o fanático.\nManténs-no vivo à força. Isso irrita os teus.\n— Estás a proteger um inimigo.\n— Estou a proteger a rendição.\nO fanático cospe:\n— Tu és nada.\nMesmo assim, enquanto ele está vivo na tua mão, o bairro hesita em voltar à luta.","choices":[],"autoTarget":383,"isFinal":false},"383":{"id":383,"text":"O emissário decide.\nO emissário olha para o fanático.\n— Amarra. Leva.\nNão o mata ali. Isso é mensagem: “há regras”.\nO alfaqui observa e acena.","choices":[],"autoTarget":384,"isFinal":false},"384":{"id":384,"text":"A caminho do rei.\nO bairro rendido fica para trás.\nLevas o alfaqui contigo. O homem da tinta também.\nO emissário caminha à tua frente.\n— Quando o rei te olhar, tu ficas calado. Eu falo. O alfaqui fala. Tu és prova viva, não voz.\nChegam a uma praça pequena. O rei está montado, estandarte, cavaleiros.\nO rei olha primeiro para o alfaqui. Depois para o homem da tinta. Só depois para ti.\n— Um bairro? — pergunta.\nO emissário responde:\n— Um bairro. Rendição. Sem saque. Sem massacre.\nO alfaqui dá um passo à frente:\n— Eu posso trazer-vos mais ruas. Mas só se a palavra for lei.\nO rei olha para ti:\n— Foste a prova?\nO emissário salva-te:\n— Foi ele. E matou um fanático que ia cortar o acordo.\nO rei:\n— Então não és só ladrão. És instrumento.\n— Quero mais dois bairros até ao pôr-do-sol. E quero o portão interior da Alcáçova.","choices":[{"text":"vais com o alfaqui tentar rendição em cadeia","target":387}],"autoTarget":null,"isFinal":false},"385":{"id":385,"text":"Ficas a estabilizar o bairro.\nAjudas a formar cordão. Apontas onde é preciso mais homens.\nO alfaqui agradece com um olhar.\nHoras depois, o bairro respira.","choices":[],"autoTarget":386,"isFinal":false},"386":{"id":386,"text":"Investigas o toque de corno.\nSobes a uma rua próxima. Vês um grupo de homens do teu lado a avançar sem ordens.\nNão é sabotagem. É estupidez.\nIntercetas o líder.\n— Recua. O bairro rendeu-se.\nEle hesita. Depois acena.","choices":[],"autoTarget":387,"isFinal":false},"387":{"id":387,"text":"Rendição em cadeia.\nO alfaqui escolhe dois homens da cidade e manda recados.\nUm bairro de cada vez.\nFunciona… até não funcionar.\nNum beco, um jovem cruzado vê um homem a baixar arma e decide que “isso é fraqueza”. Avança para matar.\nA rua ameaça explodir.\nQue decides?","choices":[{"text":"apertas os dentes e avanças sem hesitar","target":390}],"autoTarget":null,"isFinal":false},"388":{"id":388,"text":"Sombra para a colina.\nO rei dá-te um mapa rude.\n— Há uma antiga passagem — diz o emissário. — Uma escada escondida, uma porta de serviço. Se alguém sabe… és tu.\nO homem da tinta sussurra:\n— Há um corredor velho que liga a cisterna a uma rua próxima da colina. Dizem que esta cisterna é mais velha que a própria colina.","choices":[{"text":"vais sozinho","target":391}],"autoTarget":null,"isFinal":false},"389":{"id":389,"text":"Ambas as coisas.\nAceitas o impossível.\nO emissário divide tarefas. O alfaqui segue para mais ruas. Tu segues para a passagem.\nO emissário agarra-te o braço:\n— Se abres a colina e as ruas rendem… Lisboa cai como fruta madura.","choices":[],"autoTarget":391,"isFinal":false},"390":{"id":390,"text":"Polícia de guerra.\nVoltas a travar os teus.\nUm deles sussurra:\n— Quando isto acabar, tu também acabas.","choices":[],"autoTarget":391,"isFinal":false},"391":{"id":391,"text":"Vais sozinho.\nA noite é tua.\nDeslizas por ruas que já conheces. A cisterna velha. A porta de serviço.\nO cheiro a pedra molhada.","choices":[],"autoTarget":394,"isFinal":false},"392":{"id":392,"text":"Levas o homem da tinta.\nEle não gosta de sair da bolsa de negociação. Mas sabe que é necessário.\nChegam à cisterna. O velho chaveiro.\n— A colina não quer sombras. Quer sangue.\nEle dá-vos uma condição:\n— Eu levo-vos até ao corredor. Mas vocês levam-me vivo até ao sol.\nPassos acima. Alguém procura a porta.","choices":[{"text":"desces já para a cisterna","target":394}],"autoTarget":null,"isFinal":false},"393":{"id":393,"text":"Levas um guarda do rei.\nÉ pesado, leal, e faz barulho.\nMas também impõe respeito.\nChegam à cisterna. O velho chaveiro olha para o guarda e franze a testa.\n— Isto não é entrada para exército.\n— Ele é só para garantir que ninguém me mata antes de eu abrir a porta.\nO velho acena.","choices":[],"autoTarget":394,"isFinal":false},"394":{"id":394,"text":"A cisterna.\nA escada leva-te para baixo.\nChegam a um espaço amplo: uma cisterna antiga, com colunas grossas e água negra.\nO velho aponta para uma parede com musgo.\n— Ali.\nUma abertura baixa, meio tapada por pedras.\nTu ajoelhas-te e entras primeiro.\nO túnel é apertado. Cheiro a terra húmida e ferrugem.\nDepois abre para um corredor mais alto, com degraus a subir.\nO velho sussurra:\n— Isto sobe para perto de uma porta interior. Às vezes guardada. Às vezes esquecida.\nNo alto, uma réstia de luz. Vozes.\nGuardas. Dois, pelo som. Talvez três.","choices":[{"text":"deixas o homem da tinta tentar convencer os guardas a abrir","target":397},{"text":"sobes tu, silencioso, e tentas neutralizar os guardas sem alarme","target":398},{"text":"recuas e procuras outra saída da cisterna","target":399}],"autoTarget":null,"isFinal":false},"395":{"id":395,"text":"Espreitas quem vos segue.\nSobes dois lanços de escada. Olhas pela portinhola.\nVês dois homens na rua. Um tem cruz ao peito. O outro está com capuz.\nSão do teu lado.\nE o capuz… tu conheces aquele jeito de andar. É alguém do submundo.\nEles falam baixo:\n— Entraram aqui. — O rei vai pagar por cabeças. — E por silêncios.","choices":[],"autoTarget":396,"isFinal":false},"396":{"id":396,"text":"Emboscada no corredor.\nApagas a lâmpada do velho. Escuridão total.\nPassos aproximam-se. A portinhola mexe. Uma lâmina tenta entrar primeiro.\nTu agarras o pulso e puxas.\nO homem cai para dentro. Tapas-lhe a boca.\nO segundo entra a correr e tropeça no corpo.\nVês o rosto do primeiro: é do teu lado. No cinto, o símbolo do mesmo tipo que tentou sabotar rendições.\nO homem da tinta sussurra:\n— Se isto chegar ao rei… o rei vai cortar cabeças.","choices":[],"autoTarget":397,"isFinal":false},"397":{"id":397,"text":"A palavra tenta abrir.\nO homem da tinta sobe um degrau e fala em árabe.\nEle diz nomes. Diz títulos. Diz “vida”.\nSilêncio do outro lado. Depois uma resposta curta. Dúvida.\nUm guarda diz em português quebrado:\n— Se abrimos… morremos.\nO homem da tinta responde:\n— Se não abres… morres de certeza quando a colina cair.\nO guarda hesita.\nE então, do lado de fora, um corno. Não o vosso. Sinal de alerta na colina.","choices":[{"text":"mandas o homem da tinta exigir abertura já","target":402}],"autoTarget":null,"isFinal":false},"398":{"id":398,"text":"Sombra nos degraus.\nSobes sem respirar.\nNo topo, a saída é uma porta pequena, meia aberta. Por uma fresta, vês dois guardas.\nUm sentado. Outro de pé, com lança.\nUma tocha na parede.\nQual é o teu próximo passo?","choices":[{"text":"atacas já e confias na rapidez","target":403}],"autoTarget":null,"isFinal":false},"399":{"id":399,"text":"Outra saída.\nO velho abana a cabeça:\n— Há outra rota… mas é mais longa e dá perto de um poço.\nNesta missão, longo é perigoso.","choices":[],"autoTarget":400,"isFinal":false},"400":{"id":400,"text":"Sais e enfrentas os dois na rua.\nO homem com cruz avança. O de capuz hesita.\nA luta é rápida. Tu és melhor.\nO capuz cai. Conheces a cara. Foste tu que o ensinaste a mover-se em sombras.\n— Porquê? — perguntas.\nEle cospe sangue.\n— Porque o rei paga mais por silêncio do que por lealdade.","choices":[],"autoTarget":401,"isFinal":false},"401":{"id":401,"text":"Levas um vivo como prova.\nAmarra-lo e empurras escada abaixo.\nO velho chaveiro olha para ele e cospe.\nO homem da tinta não comenta.\nAgora tens um peso morto vivo.","choices":[],"autoTarget":402,"isFinal":false},"402":{"id":402,"text":"A palavra no último segundo.\nO homem da tinta fala com o guarda em árabe.\nO guarda hesita. A lança baixa.\nMas o corno ao longe toca outra vez — mais perto.\nO guarda entra em pânico. Tenta fechar a porta.","choices":[{"text":"forças a porta com violência","target":403}],"autoTarget":null,"isFinal":false},"403":{"id":403,"text":"Rápido e sujo.\nAtiras-te ao segundo guarda. Derrubas. Ele cai contra a parede. Grita.\nAlarme.\nO homem da tinta pragueja. O velho fecha os olhos.\nPassos lá em cima a correrem.","choices":[{"text":"sobes e empurras para dentro da colina já","target":408}],"autoTarget":null,"isFinal":false},"404":{"id":404,"text":"O ruído certo.\nAtiras uma pedrinha para um canto escuro. Tic.\nO guarda de pé vira a cabeça. Dá dois passos para o lado.\nÉ o espaço que precisavas.\nTu sobes num salto, apareces-lhe atrás, lâmina na garganta.\nO segundo guarda vê-te. Os olhos arregalam-se.\nO homem da tinta sussurra:\n— Não os mates se puderes…\nO segundo guarda está prestes a gritar.","choices":[],"autoTarget":405,"isFinal":false},"405":{"id":405,"text":"A subida para a Alcáçova começa a cobrar-te o corpo: degraus irregulares, vento mais frio, e a sensação de que cada passo te põe mais perto do poder — e de ser visto.\n“Abre e vive.”\nSeguras o primeiro guarda como parede humana.\nOlhas para o segundo:\n— Se gritas, ele morre. Se abres, vives.\nO segundo hesita.\nO homem da tinta sobe e fala em árabe. Diz o nome do alfaqui. Diz “um bairro já rendeu”. Diz “vida”.\nO segundo guarda engole seco.\nBaixa a lança.\nTira a tocha do suporte e segura-a.\n— Depressa — sussurra.\nEle abre a porta interior.\nEntram. O velho fecha a porta por dentro.\nAgora estás dentro da zona alta. A Alcáçova.\nUm corno ao longe. Não é alarme direto… ainda.\nO guarda rendido aponta para cima.\n— Posto de vigia. Se eles vos virem, acabam.","choices":[{"text":"sobes ao posto de vigia para o calar primeiro","target":406}],"autoTarget":null,"isFinal":false},"406":{"id":406,"text":"Posto de vigia.\nUm jovem guarda murmura uma oração que não é tua nem deles — é só humana. O vento leva-a antes que termine.\nSobes por uma escada estreita. Lá em cima, uma abertura para o exterior.\nUm homem de costas, a olhar para baixo. Ao lado, um corno pendurado.\nHá um segundo vigia, sentado, meio escondido.","choices":[{"text":"tentas neutralizar o primeiro em silêncio","target":411}],"autoTarget":null,"isFinal":false},"407":{"id":407,"text":"Corredor lateral e depósitos.\nSegues por um corredor estreito. Cheiro a madeira velha e azeite. Sacos, ânforas, grãos.\nO velho chaveiro aponta para uma escada que sobe por dentro.\n— Ali.\nO homem da tinta:\n— Lá em cima pode haver um alcaide. Se o apanhas vivo, podes abrir a porta sem luta.\nAntes de subires, ouves vozes na sala ao lado. Árabe. Latim mal pronunciado.\nEscolhe depressa.","choices":[{"text":"sobes já pela escada de serviço","target":413}],"autoTarget":null,"isFinal":false},"408":{"id":408,"text":"Direto ao portão interior.\nCorres para a frente.\nSobes um corredor e sais numa ruela estreita. A colina é labirinto.\nVês, acima, a silhueta de uma porta maior — um portão interior. A entrada da Alcáçova.\nSe ele fecha, o rei fica preso cá em baixo.","choices":[{"text":"corres para a porta e tentas abrir o mecanismo por dentro","target":425}],"autoTarget":null,"isFinal":false},"409":{"id":409,"text":"Fechas para ganhar segundos.\nTentas puxar a porta e trancá-la. A tranca é velha.\nConsegues fechar… mas não sabes por quanto tempo.\nPassos aproximam-se do lado de fora.","choices":[],"autoTarget":410,"isFinal":false},"410":{"id":410,"text":"Apagas a tocha.\nAgarras a tocha e abafas a chama contra a parede húmida. A luz morre.\nNa escuridão, moves-te.\nO guarda hesita, cego.\nForçam a passagem com menos barulho.","choices":[],"autoTarget":411,"isFinal":false},"411":{"id":411,"text":"Tentas neutralizar o primeiro.\nAproximas-te. Ele não te ouve.\nA tua mão tapa-lhe a boca. A faca faz o resto.\nO segundo levanta-se, surpreendido.","choices":[],"autoTarget":412,"isFinal":false},"412":{"id":412,"text":"Distração no posto de vigia.\nAtiras uma pedra para o pátio de baixo. O som ecoa como metal num poço. Um dos guardas hesita — e desce dois degraus para ver.\nO outro fica. O corno está-lhe preso ao peito, como uma ameaça.\nTens uma janela curta. Não é vitória. É intervalo.","choices":[{"text":"aproveitas para subir enquanto ele está distraído","target":413}],"autoTarget":null,"isFinal":false},"413":{"id":413,"text":"Escada de serviço.\nSobes. O corredor estreita e abre para uma galeria interior por trás do portão.\nO portão interior está aqui. Vês o mecanismo: trave grossa, ferrolhos, roda de madeira.\nGuardas. Dois.","choices":[{"text":"atacas os dois guardas em silêncio","target":425}],"autoTarget":null,"isFinal":false},"414":{"id":414,"text":"Espreitas a sala.\nVês quatro figuras.\nDois guardas. Um escriba. E, no centro, um homem com autoridade silenciosa: chave grande, pesada, ao cinto.\nO velho chaveiro sussurra:\n— Esse… é o homem da porta.\nO homem com a chave fala em árabe, duro. O escriba responde com medo.\nEle pega num pergaminho e sela-o. Ordem.","choices":[{"text":"atacas já e tentas capturar o homem da chave vivo","target":420}],"autoTarget":null,"isFinal":false},"415":{"id":415,"text":"Roubas provisões.\nEncontras uma corda grossa, um gancho de ferro, uma lamparina cheia.\nPode dar jeito.","choices":[],"autoTarget":417,"isFinal":false},"417":{"id":417,"text":"Escondes-te e esperas.\nOs guardas passam. Tu segues-os.\nChegam ao mecanismo. Um começa a mexer na tranca.\nTu atacas.","choices":[],"autoTarget":425,"isFinal":false},"418":{"id":418,"text":"Tentas fazer um guarda abrir.\nAproximas-te, fingindo ser mensageiro.\n— Ordem do comandante. Abram o portão.\nO guarda olha para ti.\n— Que comandante?\nNão conhece. Falhou.","choices":[],"autoTarget":419,"isFinal":false},"419":{"id":419,"text":"FINAL — “O TAMPÃO”\nFicas na porta.\nOs guardas do lado de fora empurram. A porta range.\nTu seguras.\nEntra uma lança pela frincha.\nMorres a segurar uma porta que já não precisava de ti.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"420":{"id":420,"text":"Capturas o homem da chave.\nEntras. Derrubas o primeiro guarda com o ombro.\nO homem da chave é forte. Hesita.\nTu encostas-lhe a lâmina ao pescoço.\nO escriba foge.\nO homem da chave cospe, em português rude:\n— Eu abro nada para o rei.\nPassos no corredor. Gente a vir.\nO que fazes?","choices":[{"text":"o ameaças com morte imediata","target":422}],"autoTarget":null,"isFinal":false},"421":{"id":421,"text":"Roubar a chave sem luta.\nAproximas-te. A mão vai ao metal.\nO velho chaveiro ao teu lado respira alto.\nO homem da chave vira-se.\n— Quem está aí?\nVê-te. Mão na adaga.","choices":[],"autoTarget":422,"isFinal":false},"422":{"id":422,"text":"Ameaça.\n— Abres… ou morres.\nEle ri-se.\n— Morro aqui… e a porta fica fechada.\nEle tem razão.","choices":[{"text":"ameaças a família","target":428}],"autoTarget":null,"isFinal":false},"423":{"id":423,"text":"A ponte: vida + alfaqui.\nO homem da tinta fala em árabe. Tu dizes em português:\n— Um bairro rendeu. O alfaqui está vivo. Se abrires, vives. Se não abrires… morres quando a colina cair.\nO homem da chave hesita.\nPassos no corredor.\n— Eu não abro para o rei — diz. — Eu abro para a cidade.\nEle aponta para ti:\n— Mas tu vais à frente. Se for armadilha, morres primeiro.","choices":[],"autoTarget":429,"isFinal":false},"424":{"id":424,"text":"Arrastas à força.\nPuxas o homem da chave pelo colar. Ele luta, tenta gritar.\nO escriba já está a chamar homens.\nIsto vai ser feio.","choices":[],"autoTarget":430,"isFinal":false},"425":{"id":425,"text":"Violência silenciosa.\nAtacas o guarda da lanterna. Cai.\nO segundo guarda vira-se. Derrubas.\nUm deles bate com a cabeça na pedra. Som ecoa.\nO velho chaveiro corre para a tranca.\nPassos a aproximar-se.","choices":[{"text":"ajudas o velho no mecanismo","target":431}],"autoTarget":null,"isFinal":false},"426":{"id":426,"text":"A palavra no portão.\nO homem da tinta fala em árabe. Os guardas hesitam.\nUm reconhece a voz.\nO outro, mais jovem, levanta a lanterna para gritar.","choices":[],"autoTarget":427,"isFinal":false},"427":{"id":427,"text":"Abrir sem lidar com guardas.\nO velho começa a mexer na tranca.\nUm guarda vê e levanta a arma.","choices":[],"autoTarget":428,"isFinal":false},"428":{"id":428,"text":"FINAL ALTERNATIVO — “A SOMBRA QUE VIROU MONSTRO”\nA família.\nA frase sai-te como veneno:\n— Abres… ou a tua família morre.\nO homem da chave fica branco. Depois endurece.\n— Então já não és sombra. És monstro.\nEle grita.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"429":{"id":429,"text":"“Tu vais à frente.”\nO homem da chave empurra-te para o corredor.\nChegam à sala do portão.\nDois guardas. Um reconhece o homem da chave e baixa arma.\n— Abram. Devagar.\nO homem da chave tira a chave do cinto e entrega-a ao velho chaveiro.\nO velho encaixa a chave. A trave mexe.\nO portão interior geme.\nLá fora, homens do rei a aproximarem-se.","choices":[{"text":"abres totalmente e deixas as forças do rei entrar","target":435}],"autoTarget":null,"isFinal":false},"430":{"id":430,"text":"FINAL — “A PORTA MANCHADA”\nArrastas à força para o portão.\nO homem da chave grita. Os guardas correm.\nConsegues chegar ao mecanismo. Empurras a mão dele para a tranca.\n— ABRE!\nEle obedece por medo.\nO portão abre.\nMas atrás de ti, uma lança.\nAbre-se Lisboa. Fechas-te a ti mesmo.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"431":{"id":431,"text":"Ajudas o velho.\nMãos no mecanismo. Pesado.\nPassos atrás. Estão a chegar.\n— Depressa!\nA tranca cede.","choices":[],"autoTarget":432,"isFinal":false},"432":{"id":432,"text":"Defendes a entrada.\nO primeiro guarda aparece. Tu derrubas.\nO segundo hesita. Recua.\nGanhaste tempo.","choices":[],"autoTarget":433,"isFinal":false},"433":{"id":433,"text":"O homem da tinta fala.\n— Parem! Isto é ordem da cidade!\nOs guardas hesitam. Ouvem o nome do alfaqui.\nNão atacam. Mas também não fogem.","choices":[],"autoTarget":435,"isFinal":false},"435":{"id":435,"text":"FINAL — “A PORTA ARROMBADA”\nAbres totalmente.\nO portão abre-se de par em par.\nOs homens do rei entram em massa.\nVitória rápida. Mas o alfaqui olha para ti.\n— Não era assim que devia ser.\nGanhaste a colina. Perdeste a rendição.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"436":{"id":436,"text":"Abres só o suficiente.\nO portão abre um palmo… depois dois.\nO ar da rua entra.\nO homem da tinta segura o teu olhar:\n— Se abrirmos tudo, a colina vira matadouro.\nTu acenas.\nO emissário entra com dois guardas. O alfaqui entra logo atrás.\nUm grupo de homens do rei tenta empurrar para entrar à força.\n— A PORTA É NOSSA!\nO alfaqui levanta a mão:\n— Quem quebrar a palavra… quebra a vitória.","choices":[{"text":"usas violência para travar os teus","target":438}],"autoTarget":null,"isFinal":false},"437":{"id":437,"text":"FINAL — “A PORTA COMO MOEDA”\nFechas de novo.\nUsas a abertura como ameaça.\nO homem da chave olha para ti.\n— Isto é loucura.\n— É negociação.\nO emissário compreende. Usa o portão semi-aberto para exigir rendição total.\nFunciona. Mas leva horas.\nA colina rende-se ao amanhecer. Tu és lembrado como o homem que não abriu a porta — mas usou-a.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"438":{"id":438,"text":"Travas à força.\nPões-te à frente do primeiro homem e dás-lhe um empurrão.\n— Tu não mandas em mim!\nTu encostas-lhe a lâmina ao peito.\n— Mando na porta. E hoje a porta manda em ti.\nO emissário vê o gesto:\n— Quem entrar sem ordem… morre aqui.\nOs homens recuam.","choices":[{"text":"segues em frente","target":439}],"autoTarget":null,"isFinal":false},"439":{"id":439,"text":"O emissário impõe ordem.\n— Ninguém entra sem ordem. Quem quebrar isto, perde a cabeça.\nEle puxa a espada só o suficiente.\nO homem pára.","choices":[{"text":"segues em frente","target":440}],"autoTarget":null,"isFinal":false},"440":{"id":440,"text":"No topo, a pedra é seca e as ordens são curtas. Aqui, um corno ou um sino não chamam homens — chamam destino.\nFINAL ALTERNATIVO — “A PORTA DEVORA”\nEntra multidão.\nA porta abre mais. Entra mais gente.\nLá dentro, a colina responde: pedras, setas.\nOs primeiros a entrar morrem sem ver quem os matou.\nO alfaqui grita “PAREM”.\nA palavra perde-se no sangue.\nFIM\n— O portão da Alcáçova espera-te, pesado como destino.\nA segunda porta.\nSubes com o homem da tinta. Corredor estreito, degraus irregulares.\nChegam a um arco. Vês a segunda porta. Dois guardas empurram a trave. Um terceiro segura um corno. Um quarto — melhor vestido — aponta e dá ordens.\nO homem da tinta murmura:\n— Aquele é homem do alcaide. Se o corno toca, acabou.\nA)  Neutralizar o corno. Avançar como sombra e calar o homem do corno antes que toque.\nB)  Negociar. Deixar o homem da tinta tentar convencer os guardas a render a porta.\nC)  Forçar a entrada. Atacar de rompante, usando a força para abrir caminho.","choices":[{"text":"escolhes A)","target":443}],"autoTarget":null,"isFinal":true},"443":{"id":443,"text":"A)  Neutralizar o corno.\nEscorregas pela sombra. O homem do corno está meio de lado.\nNum passo, estás atrás dele.\nTapas-lhe a boca. Puxas para trás. A lâmina entra.\nEle cai.\nO corpo bate na pedra. Toc.\nO homem de autoridade vira-se.\n— Intruso! FECHA!\nOs guardas empurram a trave.\nQue decides?","choices":[{"text":"tentas levantar a trave com alavanca improvisada","target":447}],"autoTarget":null,"isFinal":false},"444":{"id":444,"text":"B)  Negociar.\nO homem da tinta sai do arco com as mãos visíveis.\nAnota: FAMA — PONTE.\n— Um bairro rendeu. Há alfaqui com o emissário. Abrir esta porta pode poupar sangue.\nO homem de autoridade hesita. Depois faz sinal para o corno.\n— Toca.","choices":[],"autoTarget":445,"isFinal":false},"445":{"id":445,"text":"C)  Forçar a entrada.\nSais do arco e corres, direto à trave.\nAnota: FAMA — LADRÃO.\nO primeiro guarda levanta a lança. Tu empurras para o lado e atiras o corpo contra a madeira.\nA trave geme. Ainda não encaixou.\nO homem de autoridade grita: — MATA!\nO homem do corno tenta tocar.","choices":[],"autoTarget":446,"isFinal":false},"446":{"id":446,"text":"Força bruta na trave.\nEmpurras com toda a força. O largo ajuda.\nA trave range. Não cede.\nO homem de autoridade berra:\n— Tranca de cima! Agora!\nUm homem começa a subir para acionar a tranca superior.","choices":[{"text":"sobes atrás do homem da tranca e o derrubas","target":451}],"autoTarget":null,"isFinal":false},"447":{"id":447,"text":"Técnica e caos.\nVês um gancho de ferro. Enfias por baixo da trave como alavanca.\nA trave levanta um palmo.\nO homem do corno avança. Tu atiras o gancho. Acerta-lhe na mão.\nO corno cai e rola.\nO homem de autoridade recua:\n— MATEM-NOS A TODOS!","choices":[{"text":"atacas o homem de autoridade","target":449}],"autoTarget":null,"isFinal":false},"448":{"id":448,"text":"A ponte no meio do caos.\nO homem da tinta levanta a voz. Diz “alfaqui”. Diz “vida”. Diz “bairro rendeu”.\nUm guarda hesita.\nO homem de autoridade não hesita. Atira-se ao homem da tinta com a lâmina.","choices":[{"text":"proteges o homem da tinta","target":453}],"autoTarget":null,"isFinal":false},"449":{"id":449,"text":"Cortar a cabeça.\nAtiras-te ao homem de autoridade.\nEle levanta a lâmina. Tu desvias.\nA lâmina dele raspa-te a pele.\nTu empurras. Ele bate na parede. A espada cai.","choices":[{"text":"o matas agora","target":454}],"autoTarget":null,"isFinal":false},"450":{"id":450,"text":"Força bruta.\nEmpurras. Os guardas empurram do outro lado.\nNinguém cede.\nQual é o teu próximo passo?","choices":[{"text":"desistes e vais para a tranca de cima","target":451}],"autoTarget":null,"isFinal":false},"451":{"id":451,"text":"A tranca de cima.\nSobes atrás do homem. Ele está a puxar a alavanca.\nTu agarras-lhe o braço e puxas para trás.\nEle cai.\nA tranca não encaixa.","choices":[],"autoTarget":454,"isFinal":false},"452":{"id":452,"text":"Escudo humano.\nAgarras um guarda e usas o corpo dele para travar os outros.\nEles hesitam.\nO homem de autoridade avança na mesma.","choices":[],"autoTarget":453,"isFinal":false},"453":{"id":453,"text":"Proteges o homem da tinta.\nSaltas à frente. A lâmina do homem de autoridade acerta-te no braço.\nDor. Mas o homem da tinta está vivo.\nTu respondes.","choices":[],"autoTarget":454,"isFinal":false},"454":{"id":454,"text":"Matas o homem de autoridade.\nUm golpe. Ele cai.\nOs guardas olham. Um foge. Outro baixa a arma.\nA porta está aberta.","choices":[],"autoTarget":459,"isFinal":false},"455":{"id":455,"text":"Capturas vivo.\n— Pára! — gritas aos guardas.\nO homem de autoridade tenta rir.\n— Não tens coragem.\nTu apertas a lâmina.\n— Tenho… o suficiente.\nOs guardas hesitam. A trave pára.\nO homem da tinta fala em árabe.\nO homem de autoridade cospe sangue.","choices":[{"text":"ameaças matá-lo e fazes contagem","target":456}],"autoTarget":null,"isFinal":false},"456":{"id":456,"text":"Contagem.\n— Três…\nO homem de autoridade treme.\n— Dois…\nUm guarda pára.\n— Um…\n— PAREM! — grita ele. — PAREM!\nO fecho não encaixa.","choices":[],"autoTarget":459,"isFinal":false},"457":{"id":457,"text":"Lei pela voz.\n— Fala. Manda parar.\nEle grita em árabe:\n— PAREM! NINGUÉM FECHA!\nOs guardas hesitam. Funciona.","choices":[],"autoTarget":459,"isFinal":false},"458":{"id":458,"text":"Humilhação pública.\nArrastas o homem para o chão.\n— ESTE HOMEM QUER FECHAR A PORTA E SACRIFICAR AS VOSSAS FAMÍLIAS!\nOs guardas olham-se. Um vacila.\nO homem de autoridade, humilhado:\n— TRAIDORES! MATEM-NOS!\nIsto pode virar morte total.","choices":[],"autoTarget":459,"isFinal":false},"459":{"id":459,"text":"A porta suspensa.\nO emissário chega. Vê o homem de autoridade na tua mão.\n— Bom.\nO alfaqui está a costurar rendições lá em baixo.\nO emissário aproxima-se da porta.\n— Abrir só o suficiente. Formar cordão. Ninguém toca em civis.\nO vão abre.\nDo outro lado, uma rua curta que sobe. Mais guardas. Luz.\nE ao fundo, uma figura com armadura melhor, postura de comando.\nEle levanta a mão.\nUm corno aparece ao lado dele.","choices":[{"text":"atravessas já como sombra para neutralizar o homem do corno","target":460}],"autoTarget":null,"isFinal":false},"460":{"id":460,"text":"O coração da colina.\nAtravessas o vão.\nDo outro lado, o ar é mais seco.\nVês dois guardas tensos. Um vê-te e levanta a lança.\nO objetivo é o corno.\nO homem do corno, ao fundo, inspira.\nPercebes, com uma clareza fria, que Lisboa não é defendida só por muralhas — é defendida por medo.\nO vento traz o cheiro do rio e de madeira queimada. As tochas ao longe parecem estrelas sujas.\nAntes da subida final, paras.","choices":[{"text":"atacas correndo, direto ao homem do corno","target":463},{"text":"sobes para a Alcáçova","target":461}],"autoTarget":null,"isFinal":false},"461":{"id":461,"text":"Antes da subida, encostas-te um segundo à pedra fria. A noite parece maior do que tu — e, no entanto, a cidade inteira depende de pequenos passos como os teus. Lisboa não é só muralha: é medo, fome, orgulho… e a sombra onde tu sabes andar.\nA ponte grita.\nO homem de autoridade grita em árabe:\n— PAREM! ELE VEM PARA NEGOCIAR!\nO homem do corno hesita. A figura de comando franze a testa.\n— Quem és tu para dar ordens?\n— Sou a voz de quem se rendeu.\nA figura de comando avança.","choices":[{"text":"enfrentas a figura de comando","target":469}],"autoTarget":null,"isFinal":false},"462":{"id":462,"text":"Negocias pelo prisioneiro.\n— Este homem é prova de que a colina pode render-se sem massacre. Queres que ele morra aqui?\nA figura de comando olha para o prisioneiro.\n— Esse homem é fraco. Não me interessa.\nEle avança.","choices":[],"autoTarget":463,"isFinal":false},"463":{"id":463,"text":"FINAL — “O CORNO”\nO homem do corno enche o peito de ar. Se ele sopra, a colina inteira acorda.\nTens meio segundo para decidir se és herói ou cadáver.\nCorres. O homem do corno sopra.\nO som enche a colina.\nAcordaste a resistência. A colina fecha-se. O massacre começa.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"464":{"id":464,"text":"Distração.\nAtiras uma pedra para a direita. Riscas a lâmina no metal.\nO homem do corno vira a cabeça.\nUm cão aparece do nada. Rosna.","choices":[{"text":"atacas o cão","target":467}],"autoTarget":null,"isFinal":false},"467":{"id":467,"text":"Prioridade: calar o corno.\nSaltas.\nO homem do corno tenta soprar. Tu bates-lhe no peito.\nO som sai torto.\nAinda assim, é som.\nDois guardas viram-se. Um grita.\nTu arrancas o corno e esmagas contra a pedra.\nA figura de comando avança:\n— AGORA!\nEscolhe depressa.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":468},{"text":"recuas e corres para impedir que fechem a porta atrás","target":470}],"autoTarget":null,"isFinal":false},"468":{"id":468,"text":"Atiras a lâmina.\nAcerta no corno. KLANG.\nO corno cai. O som acordou meio mundo.\nA figura de comando sorri.\n— Obrigado. Agora sei onde estás.\nSem lâmina, és presa.","choices":[],"autoTarget":470,"isFinal":false},"469":{"id":469,"text":"Cortar cabeça.\nIgnoras o corno. Atacas a figura de comando.\nEle é melhor treinado. A espada dele abre-te um corte.\nO homem do corno aproveita para soprar.\nSom cheio.\nA Alcáçova acorda.\nFINAL — “O CORNO ACORDA A COLINA”\nFIM","choices":[],"autoTarget":null,"isFinal":true},"470":{"id":470,"text":"A porta atrás de ti.\nCorres de volta. Guardas correm para a porta.\nVês mãos a irem para a tranca.\nChegas ao vão e gritas:\n— ESTÃO A FECHAR!\nO emissário reage: manda dois homens entrarem.\nUm leva uma seta e cai. O outro segura.\nO homem da tinta grita em árabe para travar os guardas.\nFunciona em dois. Falha em três.\nA figura de comando aproxima-se com mais homens.\nO emissário sussurra:\n— Precisamos de um gesto. Agora.","choices":[{"text":"obrigas o prisioneiro a gritar ordem de “parar” em árabe","target":473}],"autoTarget":null,"isFinal":false},"471":{"id":471,"text":"Duelo.\nA figura de comando avança.\n— Tu és ladrão. Eu sou guarda. Aqui… eu ganho.\n— Hoje, quem ganha é quem abre portas.\nEle ataca. Tu desvias.\nO duelo é curto, sujo.\nUm cão atravessa-se.","choices":[],"autoTarget":472,"isFinal":false},"472":{"id":472,"text":"“Rendição!”\nGritas.\nDois guardas hesitam.\nA figura de comando não hesita. Avança.","choices":[],"autoTarget":473,"isFinal":false},"473":{"id":473,"text":"O prisioneiro grita ordem.\n— PAREM! NÃO FECHAM!\nA voz dele é de homem derrotado, mas ainda pesa.\nDois guardas hesitam. Um baixa a mão.\nA figura de comando berra e avança para matar o prisioneiro.","choices":[{"text":"empurras o prisioneiro para trás e o proteges","target":478}],"autoTarget":null,"isFinal":false},"474":{"id":474,"text":"O homem da tinta negocia.\nFala com o prisioneiro em árabe.\nO prisioneiro olha para a porta, para a figura de comando, para ti.\nGrita:\n— PAREM! NINGUÉM TOCA NO CORNO!\nDois guardas hesitam.\nA figura de comando berra e avança.","choices":[{"text":"proteges o prisioneiro","target":478}],"autoTarget":null,"isFinal":false},"475":{"id":475,"text":"Seguras a porta à espada.\nO primeiro guarda aparece. Tu cortas.\nO segundo hesita. Recua.\nGanhas tempo.","choices":[],"autoTarget":476,"isFinal":false},"476":{"id":476,"text":"Golpe decisivo.\nA figura de comando cai.\nO homem do corno foge.\nA porta fica aberta.","choices":[],"autoTarget":482,"isFinal":false},"477":{"id":477,"text":"Tentas capturá-lo vivo.\nEle luta como animal. Morde, esperneia.\nConsegues agarrá-lo.\n— Rende-te.\nEle cospe.\n— Nunca.","choices":[],"autoTarget":478,"isFinal":false},"478":{"id":478,"text":"O “selo” vivo.\nProteges o prisioneiro.\nA figura de comando hesita.\nEle escolhe o pior: tenta matar o prisioneiro com um golpe lateral.\nTu aparas.\nO prisioneiro grita ordens em árabe.\nDois guardas baixam armas.\nA figura de comando vê o controlo a escapar.\nEle rosna:\n— Se a colina cair… vocês morrem depois.\nO emissário:\n— Talvez. Mas hoje não.\nEle aponta para a figura de comando:\n— VIVO, se possível.\nA figura de comando recua. Depois vira-se para fugir.","choices":[{"text":"persegues e tentas capturá-lo vivo","target":481}],"autoTarget":null,"isFinal":false},"479":{"id":479,"text":"Ferro.\nDeixas o prisioneiro. A lâmina do comando desce.\nO prisioneiro cai.\nOs teus avançam e atacam.\nA porta vira batalha.","choices":[],"autoTarget":480,"isFinal":false},"480":{"id":480,"text":"Defesa do vão.\nA porta torna-se garganta.\nHomens empurram. Lanças entram.\nO emissário segura linha.\nMas sangue.\nO que fazes?","choices":[{"text":"recuas e tentas recuperar “lei” com captura do comando","target":481}],"autoTarget":null,"isFinal":false},"481":{"id":481,"text":"Persegues o nó.\nCorres atrás da figura de comando.\nEle entra numa sala de pedra. Altar pequeno. Mapas na mesa.\nEle vira-se e ataca.\nO duelo é curto.\nEle tenta empurrar-te para a janela.\nAtrás dele, uma corda com um sino pequeno.","choices":[{"text":"atacas a mão dele para impedir o sino e tentas derrubá-lo vivo","target":485}],"autoTarget":null,"isFinal":false},"482":{"id":482,"text":"Seguras a porta e o avanço.\nVoltas ao vão. O emissário mantém a linha.\nO “selo” ainda está vivo e continua a mandar parar.\nGuardas do lado de lá começam a baixar armas.\nO emissário abre mais um palmo.\n— Agora.\nA colina começa a ceder.\nO emissário olha para ti:\n— Vais à frente quando o rei vier. Se houver sabotagem… tu vês primeiro.","choices":[{"text":"ficas na colina para preparar a entrada do rei","target":487}],"autoTarget":null,"isFinal":false},"483":{"id":483,"text":"Matas a figura de comando.\nResolves um nó. Criaste uma bandeira.\nOs homens dele lutam mais por vingança.","choices":[],"autoTarget":484,"isFinal":false},"484":{"id":484,"text":"A batalha decide.\nOs teus empurram. Os deles recuam.\nA porta alarga-se.\nMas o preço: corpos.","choices":[],"autoTarget":485,"isFinal":false},"485":{"id":485,"text":"Derrubas vivo.\nAcertas-lhe no braço. A espada cai.\nEmpurras-o para o chão.\n— Não te mexas.\nEle obedece. Cansaço ou rendição.","choices":[],"autoTarget":486,"isFinal":false},"486":{"id":486,"text":"Derrubas com força.\nEle bate com a cabeça. Fica imóvel.\nVivo ou morto? Não tens tempo.","choices":[],"autoTarget":487,"isFinal":false},"487":{"id":487,"text":"Preparas a entrada do rei.\nA porta está aberta o suficiente.\nO emissário organiza um cordão.\nO homem da tinta repete ordens em árabe.\nO rei aproxima-se.\nAntes de ele aparecer, surge um homem do teu lado, cara conhecida, ar de “servo fiel”.\nEle aproxima-se do emissário:\n— Senhor… deixem-me limpar a colina. Sem negociações.\nO emissário não responde. Olha para ti.\nO rei entra.\nEle olha para a porta, para os guardas rendidos, para o prisioneiro.\nDepois para o sabotador.\n— Quem és tu?\n— Um servo. Quero garantir que Lisboa nunca mais levanta cabeça.\nO rei olha para o emissário:\n— Isto é rendição… ou é truque?\nO emissário responde:\n— É rendição parcial. Controlada.\nO rei vira-se para ti:\n— Tu. Sombra. Diz-me: isto aguenta?","choices":[{"text":"dizes a verdade: “aguenta se houver regra”","target":489}],"autoTarget":null,"isFinal":false},"488":{"id":488,"text":"Desces para avisar o alfaqui.\nEncontras o alfaqui numa rua rendida, sob guarda do emissário.\n— A colina vai render-se. O rei vai subir. Protege-te.\nEle acena.\n— A cidade precisa de ti viva.","choices":[],"autoTarget":489,"isFinal":false},"489":{"id":489,"text":"Lei.\n— Aguenta… se houver regra. Se entra multidão e saque… a cidade levanta-se.\nO rei fixa-te.\nO clérigo murmura algo em latim.\nO rei olha para o sabotador:\n— E tu queres sangue.\n— Quero vitória.\n— Vitória sem cidade é derrota.\nEle aponta para o emissário:\n— Tu controlas. E se alguém saquear… enforcado.\nO sabotador fica tenso.\nO rei vira-se para o portão:\n— Abrir mais um palmo. Só mais um.","choices":[{"text":"ficas colado ao sabotador para o impedir","target":492}],"autoTarget":null,"isFinal":false},"490":{"id":490,"text":"FINAL — “VITÓRIA QUE ARDE”\n“Abre tudo.”\nTu dizes o que o sangue do rei quer ouvir.\n— Abre tudo. Acaba já.\nO emissário olha-te como quem vê ruína.\nO rei ordena:\n— Abram.\nA multidão tenta subir. A colina responde com pedras, setas.\nO bairro rendido em baixo ouve gritos e pensa “mentira”. Levanta-se.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"491":{"id":491,"text":"Denuncias o sabotador.\n— Esse homem quer falhar o acordo para ganhar favor no sangue. Já tentou sabotar antes.\nO sabotador:\n— Mentira de ladrão.\nO rei olha para o emissário.\n— Prendam-no.\nDois guardas avançam.\nO sabotador saca uma lâmina.","choices":[{"text":"o enfrentas e o derrubas","target":496}],"autoTarget":null,"isFinal":false},"492":{"id":492,"text":"O fim aproxima-se. Agora, uma decisão errada não mata só um homem: muda a cidade.\nColas-te ao sabotador.\nO rei dá ordens. Tudo parece controlado.\nO sabotador vira-se para ti com um movimento rápido.\nLâmina em direção ao teu abdómen.\nTu desvias. A lâmina raspa-te a pele.\nO rei vira-se:\n— O que é isto?\nO sabotador grita:\n— O LADRÃO MATOU UM RENDIDO! ELE ESTÁ A TRAIR!","choices":[{"text":"derrubas o sabotador e o apresentas vivo ao rei","target":498}],"autoTarget":null,"isFinal":false},"493":{"id":493,"text":"Desces para avisar o alfaqui.\nJá o fizeste. Agora voltas.","choices":[],"autoTarget":494,"isFinal":false},"494":{"id":494,"text":"Segues o rei.\nEle avança. Tu vais à frente.\nA Alcáçova tem corredores que parecem feitos para confundir.\nChegas a uma porta pesada.\nDois guardas. Um já não tem vontade. O outro ainda tem.\nO que ainda tem vontade leva a mão a um sino pequeno.\nQue decides?","choices":[{"text":"apanhas a mão dele antes do sino","target":504}],"autoTarget":null,"isFinal":false},"496":{"id":496,"text":"Os guardas levam o sabotador.\n— Enforcado ao amanhecer.\nO emissário aproxima-se:\n— Fizeste bem. Mas agora és demasiado útil. E isso também mata.\nO rei aponta para o interior da Alcáçova:\n— Quero a sala de comando. Agora.","choices":[{"text":"segues com o rei","target":501}],"autoTarget":null,"isFinal":false},"497":{"id":497,"text":"Segues o sabotador.\nEle foge por um corredor. Tu segues.\nEntra numa sala. Fecha a porta.\nTu esperas. Ele não sai.","choices":[],"autoTarget":498,"isFinal":false},"498":{"id":498,"text":"Prova viva.\nAgarras o sabotador, torces, empurras para o chão.\n— ESTE HOMEM MENTE PARA QUEBRAR O ACORDO!\nO emissário dá-lhe um murro.\n— Tu queres saque.\nO rei:\n— Levem-no. Enforcado ao amanhecer.\nO sabotador é arrastado.\n— O ladrão… é igual a mim…\nO rei:\n— O ladrão obedeceu-me.","choices":[],"autoTarget":501,"isFinal":false},"499":{"id":499,"text":"FINAL — “A MENTIRA QUE SOBREVIVEU”\nMatas o sabotador.\nO corpo cai. Sangue.\nUm homem do teu lado grita:\n— Ele matou um dos nossos!\nOutro:\n— Foi defesa!\nGuardas rendidos levantam armas.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"500":{"id":500,"text":"Política sem luta.\nGritas:\n— MENTE! ELE QUER SAQUE!\nO sabotador grita mais alto:\n— TRAIÇÃO!\nDois gritos. O rei:\n— Calem-nos.\nGuardas avançam. Há empurrões.\nFunciona… mas é feio.","choices":[],"autoTarget":501,"isFinal":false},"501":{"id":501,"text":"A sala de comando.\nSegues com o rei, mas à frente.\nSubis escadas, atravessais uma galeria.\nChegas a uma porta pesada.\nDois guardas. Um já sem vontade. Outro ainda tem.\nO que ainda tem vontade leva a mão a um sino.","choices":[{"text":"apanhas a mão dele antes do sino","target":504}],"autoTarget":null,"isFinal":false},"502":{"id":502,"text":"Desces para ver o alfaqui.\nEncontras o alfaqui numa rua rendida, sob guarda.\n— A colina vai cair. O rei sobe. Protege-te.\nEle acena.\n— Desaparece. A cidade precisa de esquecer-te.\nEle dá-te um fio de couro com um símbolo.\n— Passagem. Não abuses.","choices":[],"autoTarget":503,"isFinal":false},"503":{"id":503,"text":"Caças a figura de comando.\nSegues o rasto. Perdes-te na Alcáçova.\nNão o encontras.","choices":[],"autoTarget":504,"isFinal":false},"504":{"id":504,"text":"Controle.\nAgarras-lhe o pulso. Torces.\nEle grita de dor — não toca o sino.\nEmpurras contra a parede.\n— Se obedeceres, vives.\nO guarda treme. O outro baixa a arma.\nO rei passa.\nA porta abre.\nDentro, uma sala com mesa, pergaminhos, mapas, uma vela.\nE a figura de comando, ferida, de pé.\n— Lisboa não é tua.\nO rei:\n— Lisboa é de quem a governa.\nA figura de comando sorri:\n— Então governa… com sangue.\nEle mete a mão ao cinto. Um pequeno pote.","choices":[{"text":"te atiras ao pote para o arrancar da mão dele","target":507}],"autoTarget":null,"isFinal":false},"505":{"id":505,"text":"Matas o guarda.\nO sino fica calado. Sangue no chão.\nO rei não agradece. Só avança.","choices":[],"autoTarget":506,"isFinal":false},"506":{"id":506,"text":"FINAL — “O SINO”\nTentas palavra.\nO guarda não quer palavra. Quer lenda.\nToca o sino.\nO som corta a colina.\nO rei:\n— Então morram.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"507":{"id":507,"text":"O pote.\nAtiras-te.\nA mão dele abre-se. O pote cai.\nTu apanhas no ar.\nCheiro a óleo, resina.\nEle tenta empurrar-te para a janela.\nUma lâmina pequena espetada na tua coxa.\nDor.","choices":[{"text":"te afastas e entregas o pote ao emissário","target":510}],"autoTarget":null,"isFinal":false},"508":{"id":508,"text":"Captura viva.\nAgarras o braço ferido, torces, empurras para o chão.\nO emissário ajuda.\nA figura de comando cospe:\n— Vocês não entendem. A cidade nunca obedece.\nO rei:\n— Obedece quando há regra.\n— Então cria regra… e sê odiado.\nO rei:\n— Guardem-no vivo.","choices":[],"autoTarget":511,"isFinal":false},"509":{"id":509,"text":"Matas o nó.\nCortas-lhe a garganta.\nEle cai sem palavra.\nO rei:\n— Um homem.\nSó isso.","choices":[],"autoTarget":511,"isFinal":false},"510":{"id":510,"text":"Entregas o pote.\nO emissário atira-o para um canto e pisa-o.\nPrende a figura de comando.","choices":[],"autoTarget":511,"isFinal":false},"511":{"id":511,"text":"A colina cede.\nA sala de comando está tomada. O portão interior está controlado.\nO rei está dentro da zona alta.\nA noite não acabou… mas a guerra, aqui, acabou.\nO rei aproxima-se de ti. Olha para a tua perna ferida, depois para o teu rosto.\n— O que queres?","choices":[{"text":"pedes liberdade e desaparecimento","target":512}],"autoTarget":null,"isFinal":false},"512":{"id":512,"text":"Liberdade.\n— Quero desaparecer.\nO rei:\n— Desaparecer… é fácil. Viver depois… é difícil.\nEle faz um gesto:\n— Solta-o. Mas se eu ouvir o nome dele outra vez, corto-lho.","choices":[],"autoTarget":515,"isFinal":false},"513":{"id":513,"text":"Um lugar ao lado do rei.\n— Perdão formal. Um lugar.\nO rei sorri um milímetro.\n— Um ladrão na minha casa? Para quê? Para me roubar melhor?\nO emissário:\n— Para abrir portas, senhor. E para fechar.\nO rei:\n— Primeiro prova que não és ambição. Vais impedir saque numa rua rendida.","choices":[],"autoTarget":520,"isFinal":false},"514":{"id":514,"text":"A coisa certa.\n— Quero que a palavra valha. Que quem se rendeu viva. E quero que o alfaqui viva.\n— E tu, o que ganhas com isso? — pergunta o alfaqui.\nTu encolhes os ombros.\n— Um nome que não me enforquem quando isto acabar.\nO rei fica em silêncio.\nO emissário observa-te.\nO rei olha para o clérigo, depois para o emissário:\n— Quem saquear… enforcado. Quem tocar em rendidos… enforcado. Quem matar o alfaqui… enforcado.\nEle vira-se para ti:\n— E tu… desapareces.\nO emissário:\n— Vai pela porta de serviço. Há homens que ainda te querem morto.\nO homem da tinta entra:\n— O alfaqui está vivo. A cidade está a baixar armas.\nQual é o teu próximo passo?","choices":[{"text":"sais já pela porta de serviço, sozinho","target":515}],"autoTarget":null,"isFinal":false},"515":{"id":515,"text":"A saída.\nDesces por corredores de serviço. Pedra húmida. Portas pequenas.\nA madrugada começa a clarear.\nVês um grupo de homens do teu lado, saqueadores, a arrastar um saco.\nUm deles segura uma mulher pelo braço.\nSe o rei descobre que deixaste saque, a tua “liberdade” dura até ao amanhecer. Tens de mostrar que a palavra vale — mesmo que não acredites nela.","choices":[{"text":"desapareces e deixas a rua para os homens do rei resolverem","target":519}],"autoTarget":null,"isFinal":false},"516":{"id":516,"text":"Vês o alfaqui.\nEle está sentado, exausto, mas vivo.\n— A tua sombra hoje fez luz — diz ele.\n— Agora desaparece. A cidade precisa de esquecer-te.\nEle mete-te um pequeno fio de couro na mão, com um símbolo.\n— Passagem. Não abuses.","choices":[],"autoTarget":517,"isFinal":false},"517":{"id":517,"text":"Documento.\nPediste ao escriba um pergaminho: ordem de proteger rendidos e o alfaqui.\nO rei deixou.\nO pergaminho pode salvar-te ou condenar-te.","choices":[],"autoTarget":519,"isFinal":false},"519":{"id":519,"text":"FINAL — “A SOMBRA QUE SOBREVIVE”\nDesapareces.\nPassas pela rua sem olhar.\nA perna dói. A vida continua.\nVives. Lisboa cai com menos sangue do que podia. Mas a tua consciência fica como ferida que não fecha.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"520":{"id":520,"text":"A última rua.\nUma mulher recolhe à pressa um ícone de madeira e um punhado de sal. Há coisas que valem mais do que ouro quando a cidade cai.\nA mulher tenta soltar o braço. O homem puxa-a como saco.\nTu dás um passo para a rua. Não sabes bem porquê. Talvez porque o alfaqui disse que a cidade precisa de esquecer o ladrão — e um ladrão que só rouba não se esquece. Talvez porque, se salvas esta família, o alfaqui fica a dever-te vida. E vida abre portas que ouro não abre.\nOu talvez, simplesmente, já não sejas só um ladrão.\nO primeiro saqueador reconhece-te.\n— Olha… o ladrão do rei.\n— Ordem do rei. Quem toca em rendidos… enforcado ao amanhecer.\nEles riem com medo.\nUm deles aponta para a tua perna ferida:\n— Estás a sangrar. Estás sozinho.","choices":[{"text":"mostras o pergaminho/ordem e chamas os guardas do emissário","target":522}],"autoTarget":null,"isFinal":false},"521":{"id":521,"text":"Prova na sombra.\nRecuas. Eles voltam a rir.\nSegues-os à distância.\nEles entram numa rua mais larga onde há um cordão do emissário.\nTu apanhas uma pedra e atiras ao chão.\n— SAQUE! AQUI! ORDEM DO REI!\nO cordão vira-se. O oficial vê o saco, vê a mulher.\n— Em nome do rei… presos!\nA mulher é solta. Cai de joelhos.\nO oficial olha para ti:\n— Quem és tu para gritar “ordem do rei”?\nTu respondes:\n— Sou alguém que ouviu a ordem.","choices":[],"autoTarget":524,"isFinal":false},"522":{"id":522,"text":"Lei direta.\n— GUARDA!\nDois homens do emissário aparecem.\nTu mostras o selo.\nO líder tenta sorrir:\n— Foi confusão.\nTu apontas para a mulher:\n— Confusão tem rosto?\nO guarda agarra o líder.","choices":[],"autoTarget":524,"isFinal":false},"523":{"id":523,"text":"Violência curta.\nAtacas o líder. Lâmina cai. Empurrão na garganta.\nEle cai sem ar.\nOs outros congelam.\nUm deles tenta atacar-te.\nUma voz atrás:\n— PAREM!\nÉ um homem do emissário com dois guardas.\n— Presos.","choices":[],"autoTarget":524,"isFinal":false},"524":{"id":524,"text":"A cidade aprende… ou finge aprender.\nA rua acalma. A mulher é levada para junto de outras famílias.\nO oficial do emissário aproxima-se.\n— Se queres viver, vai-te embora antes do amanhecer.\nTu olhas para o céu. A primeira luz aparece.","choices":[{"text":"desapareces da cidade","target":525}],"autoTarget":null,"isFinal":false},"525":{"id":525,"text":"Lisboa cai. E o que fizeste (ou não) vai ficar colado a ti como fumo na roupa.\nFINAL CANÓNICO — “A SOMBRA SAI DE LISBOA”\nSais pela rua baixa, pelo caminho que só os que fogem conhecem.\nLisboa atrás de ti faz um som novo: não é vitória, não é derrota. É cidade a tentar continuar.\nA tua perna dói a cada passo, mas a dor é prova de que ainda estás vivo.\nAo longe, um sino de igreja — agora não como alarme, mas como manhã.\nTu nunca mais voltas a ver o rei. E isso é a tua verdadeira liberdade.\nAnos depois, alguém falou de um velho que guardava uma porta esquecida na colina. Diziam que tinha ajudado um ladrão, numa noite de cerco, e que Lisboa nunca lhe pagou. Ele preferiu assim.\nFIM\nSe tens PALAVRA DO ALFAQUI, lê este epílogo:\nO alfaqui cumpre. No meio do caos, alguém te faz sinal por uma rua estreita. Não é ouro — é saída. E uma vida que não te pertence, mas que te foi confiada.","choices":[],"autoTarget":null,"isFinal":true},"526":{"id":526,"text":"Se NÃO tens PALAVRA DO ALFAQUI, lê este epílogo:\nFINAL ALTERNATIVO — “A PONTE”\nNinguém te deve nada. A cidade cai, e tu cais com ela — não no corpo, mas no nome. Continuas vivo, sim. Mas vivo como pedra: frio, anónimo, sem abrigo.\nEncontras o alfaqui já com luz de manhã.\nSe a tua FAMA é PONTE, lê este epílogo extra:\nEle ouve em silêncio quando lhe dizes:\nMais tarde, quando falam de rendição, alguém lembra-se de um ladrão que abriu uma porta sem a ensopar em sangue. O rei não te agradece — mas também não te caça.\n— Na última rua… a palavra valeu.\nSe a tua FAMA é LADRÃO, lê este epílogo extra:\nEle fecha os olhos um segundo.\nOs teus actos correm mais depressa do que tu. Há quem te celebre. Há quem te tema. E há quem espere o momento certo para te pagar a sombra com sombra.\n— Então a cidade pode aprender.\nEle dá-te uma última coisa: não ouro, não papel. Um nome curto em árabe — um nome que significa “passagem”.\n— Se um dia precisares atravessar… mostra isto aos homens certos.\nAntes de saíres da cidade, procuraste o velho chaveiro. A porta dele estava fechada. Bateste três vezes, o ritmo que ele usara. Ninguém respondeu. Deixaste uma moeda na ombreira e partiste.\nTu sais de Lisboa com esse nome na cabeça e sem mais nada.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"527":{"id":527,"text":"FINAL ALTERNATIVO — “FERRAMENTA DO REI”\nVoltas à Alcáçova.\nO rei olha-te e sorri como quem pega numa faca boa.\n— Pensei que ias desaparecer.\nTu respondes:\n— Posso abrir portas. E posso fechá-las.\nO rei acena.\n— Então vais viver… perto da forca.\nE tu percebes: escolheste poder. E poder vem com preço.\nFIM\nFIM DO LIVRO-JOGO","choices":[],"autoTarget":null,"isFinal":true}}</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ── SVG ICONS ── */
const Icon = {
  Sound: ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>,
  Mute:  ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>,
  Map:   ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>,
  Sun:   ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
  Moon:  ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
  Menu:  ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>,
  Back:  ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>,
  Arrow: ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  Close: ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Sword: ()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>,
};

/* ── AUDIO ── */
class Ambience {
  constructor(){this.ctx=null;this.master=null;this.on=false;this._nodes=[];}
  
  _ctx(){
    if(!this.ctx) this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(this.ctx.state==='suspended') this.ctx.resume();
    return this.ctx;
  }

  start(){
    const ctx=this._ctx();
    if(this.master){this.master.gain.setTargetAtTime(1,ctx.currentTime,1.2);this.on=true;return;}

    const master=ctx.createGain(); master.gain.value=0;
    master.connect(ctx.destination); this.master=master;

    // Helper: oscillator layer
    const osc=(freq,type,gain,detune=0)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type; o.frequency.value=freq;
      if(detune) o.detune.value=detune;
      g.gain.value=gain;
      o.connect(g); g.connect(master); o.start();
      return {o,g};
    };

    // Drone trio — prime cycle lengths so they drift apart
    osc(68,'sine',.16);
    osc(102,'sine',.06);
    osc(136,'sine',.025);

    // Slow beating between two close freqs
    osc(71,'sine',.04);   // 3Hz apart → very slow beat

    // Wind — filtered noise, two buffers of prime lengths
    const mkWind=(len,freq,bw,gainVal,lfoHz)=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*len,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
      const filt=ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=freq; filt.Q.value=bw;
      const g=ctx.createGain(); g.gain.value=gainVal;
      const lfo=ctx.createOscillator(); const lfog=ctx.createGain();
      lfo.frequency.value=lfoHz; lfog.gain.value=gainVal*.7;
      lfo.connect(lfog); lfog.connect(g.gain); lfo.start();
      src.connect(filt); filt.connect(g); g.connect(master); src.start();
    };
    mkWind(47, 380,.35,.038,.07);   // 47s loop, low wind
    mkWind(73, 900,.25,.018,.11);   // 73s loop, higher wind
    mkWind(31,2200,.2, .008,.19);   // 31s loop, air texture

    // Periodic silence: every ~4-6 min fade to near zero for 10s
    const silence=()=>{
      const wait=(240+Math.random()*120)*1000;
      setTimeout(()=>{
        if(!this.on) return;
        master.gain.setTargetAtTime(.05,ctx.currentTime,.8);
        setTimeout(()=>{
          if(!this.on) return;
          master.gain.setTargetAtTime(1,ctx.currentTime,2.5);
          silence();
        },10000);
      },wait);
    };
    silence();

    // Sporadic distant event (every 2-5 min)
    const event=()=>{
      const wait=(120+Math.random()*180)*1000;
      setTimeout(()=>{
        if(!this.on){event();return;}
        const o=ctx.createOscillator(),g=ctx.createGain(),rev=ctx.createConvolver();
        o.type='sine'; o.frequency.value=220+Math.random()*80;
        g.gain.setValueAtTime(0,ctx.currentTime);
        g.gain.linearRampToValueAtTime(.08,ctx.currentTime+.3);
        g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+3.5);
        o.connect(g); g.connect(master);
        o.start(); o.stop(ctx.currentTime+3.5);
        event();
      },wait);
    };
    event();

    master.gain.setTargetAtTime(1,ctx.currentTime,1.2);
    this.on=true;
  }

  stop(){
    if(!this.master) return;
    this.master.gain.setTargetAtTime(0,this.ctx.currentTime,.6);
    this.on=false;
  }

  ping(freq=660,dur=.16,startFreq=null){
    if(!this.on||!this.ctx) return;
    const ctx=this.ctx;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';
    if(startFreq){
      o.frequency.setValueAtTime(startFreq,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(freq,ctx.currentTime+dur);
    } else {
      o.frequency.value=freq;
    }
    g.gain.setValueAtTime(.11,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+dur);
  }

  playChoice(){ this.ping(700,.15); }
  playBack()  { this.ping(320,.22,520); }
  playContinue(){ this.ping(440,.2); }
  playFinal(){
    if(!this.on||!this.ctx) return;
    const ctx=this.ctx;
    [330,440,550,660].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+i*.12);
      g.gain.linearRampToValueAtTime(.09,ctx.currentTime+i*.12+.08);
      g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+i*.12+1.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+i*.12); o.stop(ctx.currentTime+i*.12+1.2);
    });
  }
}
const amb=new Ambience();

/* ── APP ── */
function App(){
  const [gd,setGd]=useState(null);
  const [names,setNames]=useState(null);
  const [sec,setSec]=useState(1);
  const [hist,setHist]=useState([1]);
  const [labels,setLabels]=useState({});
  const [theme,setTheme]=useState('dark');
  const [sound,setSound]=useState(false);
  const [showMenu,setShowMenu]=useState(false);
  const [showMap,setShowMap]=useState(false);
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState(null);
  const [ak,setAk]=useState(0);  // animation key
  const mainRef=useRef(null);

  useEffect(()=>{
    try{
      const g=JSON.parse(document.getElementById('game-data').textContent);
      const n=JSON.parse(document.getElementById('chapter-names').textContent);
      setGd(g); setNames(n);
      const sv=localStorage.getItem('ladrao_v4');
      if(sv){const{s,h,t,l}=JSON.parse(sv);setSec(s);setHist(h);setTheme(t||'dark');setLabels(l||{});}
      setLoading(false);
    }catch(e){setErr(e.message);setLoading(false);}
  },[]);

  useEffect(()=>{
    if(!loading&&gd) localStorage.setItem('ladrao_v4',JSON.stringify({s:sec,h:hist,t:theme,l:labels}));
  },[sec,hist,theme,labels,loading,gd]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.querySelector('meta[name=theme-color]')?.setAttribute('content',theme==='dark'?'#110f0c':'#f5f0e8');
  },[theme]);

  useEffect(()=>{ mainRef.current?.scrollTo({top:0,behavior:'smooth'}); },[sec]);
  useEffect(()=>{ if(gd&&gd[sec]?.isFinal) amb.playFinal(); },[sec,gd]);

  const go=useCallback((target,label,sfx='choice')=>{
    if(sfx==='choice') amb.playChoice();
    else if(sfx==='continue') amb.playContinue();
    setLabels(prev=>({...prev,[sec]:label}));
    setHist(h=>[...h,target]);
    setSec(target); setAk(k=>k+1);
    setShowMenu(false);
  },[sec]);

  const goBack=useCallback(()=>{
    if(hist.length<2) return;
    amb.playBack();
    const nh=hist.slice(0,-1);
    setHist(nh); setSec(nh[nh.length-1]); setAk(k=>k+1);
  },[hist]);

  const restart=useCallback(()=>{
    setSec(1);setHist([1]);setLabels({});
    localStorage.removeItem('ladrao_v4');
    setShowMenu(false); setAk(k=>k+1);
  },[]);

  const toggleSound=useCallback(()=>{
    if(!sound){amb.start();setSound(true);}
    else{amb.stop();setSound(false);}
  },[sound]);

  if(loading) return <div className="center"><div className="load-icon"><Icon.Sword/></div><div style={{color:'var(--t2)',fontSize:'.9rem'}}>A carregar…</div></div>;
  if(err) return <div className="center"><div style={{color:'var(--danger)'}}>Erro: {err}</div></div>;

  const cur=gd[sec];
  if(!cur) return(
    <div className="center">
      <div style={{color:'var(--acc)',marginBottom:'.5rem'}}><Icon.Sword/></div>
      <h2 style={{fontFamily:'Cormorant Garamond,serif',fontWeight:300,fontSize:'1.4rem',marginBottom:'.5rem'}}>Capítulo não encontrado</h2>
      <p style={{color:'var(--t2)',marginBottom:'1.5rem',fontSize:'.9rem'}}>Secção {sec}</p>
      {hist.length>1&&<button onClick={goBack} className="mbtn mbtn-secondary" style={{border:'none',cursor:'pointer',padding:'.75rem 1.5rem',borderRadius:'10px',fontFamily:'Libre Baskerville,serif'}}>← Voltar</button>}
    </div>
  );

  const progress=Math.min(100,Math.round(hist.length/501*100));
  const chName=names?.[sec]||'';
  const hasChoices=cur.choices?.length>0;
  const isAuto=!hasChoices&&cur.autoTarget&&!cur.isFinal;

  // Detectar final e tocar som
  // (movido para cima — antes dos returns condicionais)

  return(
    <div>
      {/* HEADER */}
      <header className="hdr">
        <div className="hdr-inner">
          <div className="hdr-logo">Lisboa <strong>1147</strong></div>
          <button className={`hdr-btn${!sound?' muted':''}`} onClick={toggleSound} title={sound?'Silenciar':'Som ambiente'}>
            {sound?<Icon.Sound/>:<Icon.Mute/>}
          </button>
          <button className="hdr-btn" onClick={()=>setShowMap(true)} title="O teu caminho"><Icon.Map/></button>
          <button className="hdr-btn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} title="Modo dia/noite">
            {theme==='dark'?<Icon.Sun/>:<Icon.Moon/>}
          </button>
          <button className="hdr-btn" onClick={()=>setShowMenu(true)} title="Menu"><Icon.Menu/></button>
        </div>
        <div className="prog"><div className="prog-fill" style={{width:`${progress}%`}}/></div>
      </header>

      {/* BACK FAB */}
      <button className="back-fab" onClick={goBack} disabled={hist.length<2} title="Voltar">
        <Icon.Back/>
      </button>

      {/* MAIN */}
      <main ref={mainRef}>
        <div key={ak} className={`sec-anim${hasChoices?' has-choices':''}`}>
          <div className="ch-eyebrow">Capítulo {sec}</div>
          <h1 className="ch-title">{chName}</h1>
          <div className="ch-rule"/>

          <div className="narrative">
            {cur.text.split('\n\n').filter(Boolean).map((p,i)=><p key={i}>{p}</p>)}
          </div>

          {/* CHOICES */}
          {hasChoices&&(
            <div className="choices">
              {cur.choices.map((c,i)=>(
                <button key={i} className="choice" onClick={()=>go(c.target,c.text,'choice')}>
                  <span className="choice-arr"><Icon.Arrow/></span>
                  <span className="choice-body">
                    <span className="choice-text">{c.text}</span>
                    <span className="choice-num">{c.target}</span>
                  </span>
                </button>
              ))}
            </div>
          )}

          {/* AUTO-ADVANCE */}
          {isAuto&&(
            <button className="continue-btn" onClick={()=>go(cur.autoTarget,'Continuar','continue')}>
              <Icon.Arrow/>
              Continuar
            </button>
          )}

          {/* FINAL */}
          {cur.isFinal&&(
            <div className="final-card">
              <div className="final-icon"><Icon.Sword/></div>
              <div className="final-label">FINAL</div>
              <button className="final-restart" onClick={restart}>Jogar Novamente</button>
            </div>
          )}
        </div>
      </main>

      {/* MAP */}
      {showMap&&(
        <div className="sheet-overlay" onClick={()=>setShowMap(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-head">
              <div className="sheet-title">O teu caminho</div>
              <button className="sheet-close" onClick={()=>setShowMap(false)}><Icon.Close/></button>
            </div>
            <div className="sheet-body">
              {hist.map((s,idx)=>{
                const isCur=idx===hist.length-1;
                const label=labels[s];
                return(
                  <div key={idx} className="path-row">
                    <div className="path-spine">
                      <div className={`path-dot${isCur?' cur':idx===0?' first':''}`}/>
                      {!isCur&&<div className="path-line"/>}
                    </div>
                    <div className="path-info">
                      <div className="path-cap">Capítulo {s}</div>
                      <div className={`path-name${isCur?' cur':''}`}>{names?.[s]||`Cap. ${s}`}</div>
                      {label&&<div className="path-choice">"{label}"</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* MENU */}
      {showMenu&&(
        <div className="modal-overlay" onClick={()=>setShowMenu(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Menu</div>
            <div className="modal-btns">
              <button className="mbtn mbtn-primary" onClick={()=>setShowMenu(false)}>Continuar</button>
              {hist.length>1&&<button className="mbtn mbtn-secondary" onClick={goBack}>← Voltar</button>}
              <button className="mbtn mbtn-secondary" onClick={()=>{setShowMenu(false);setShowMap(true);}}>Ver caminho</button>
              <button className="mbtn mbtn-danger" onClick={restart}>Recomeçar</button>
            </div>
            <div className="modal-stats">
              <div><div className="stat-l">Capítulo</div><div className="stat-v">{sec}</div></div>
              <div><div className="stat-l">Progresso</div><div className="stat-v">{progress}%</div></div>
              <div><div className="stat-l">Passos</div><div className="stat-v">{hist.length}</div></div>
              <div><div className="stat-l">Som</div><div className="stat-v" style={{fontSize:'1rem',cursor:'pointer'}} onClick={toggleSound}>{sound?'On':'Off'}</div></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
