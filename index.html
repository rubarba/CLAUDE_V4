 rígido. O segundo guarda aproxima-se e pára.\n— Um som e ele morre.\nO segundo hesita. O largo avança e agarra-o.\nO homem-chave aponta, tremendo:\n— Dois ferros… duas trancas…","choices":[],"autoTarget":142,"isFinal":false},"142":{"id":142,"text":"Calas o homem-chave e esperas pelo segundo guarda.\nUm golpe curto na base do crânio. Ele cai.\nO segundo guarda aproxima-se, vê o companheiro no chão e levanta a lanterna.\nA luz varre a tua cara.\n— Quem…?","choices":[{"text":"atacas de imediato e o calas","target":156}],"autoTarget":null,"isFinal":false},"143":{"id":143,"text":"Ignoras a família.\nMandas os teus avançar. O choro da mulher fica para trás como fantasma.\nO corredor abre para uma rua estreita. A luta espalha-se.\nJá não é só infiltração: é rutura.","choices":[],"autoTarget":144,"isFinal":false},"144":{"id":144,"text":"Obrigas a família a indicar saída.\n— Rua mais rápida para o portão! — sussurras.\nO homem treme, mas aponta:\n— Pátios… escadas… dá à rua larga…\nTu deixas a família passar para dentro e puxas os teus para a porta indicada.","choices":[],"autoTarget":145,"isFinal":false},"145":{"id":145,"text":"Puxas o homem caído e reabres passagem.\nAgarras no homem ferido e arrastas para a parede. O sangue marca a pedra.\nOs homens atrás empurram e passam.\nO ferido agarra-te o pulso.\n— Não me deixes…\nQual é o teu próximo passo?","choices":[],"autoTarget":146,"isFinal":false},"146":{"id":146,"text":"Tentas liderar.\n— Um de cada vez! Encostem à esquerda! Sem gritos!\nPor um instante, funciona.\nMas um homem do teu lado grita:\n— Quem és tu para mandar?\nA dúvida espalha-se.\nDo interior, uma lança inimiga corta o ar a centímetros da tua cara.\nA) Recuar para trás da coluna — 134 B) Lançar a faca para distrair o arqueiro — 147 C) Gritar em árabe quebrado para confundir — 148","choices":[{"text":"segues em frente","target":147}],"autoTarget":null,"isFinal":false},"147":{"id":147,"text":"Lanças a faca.\nO arqueiro inimigo desvia-se. A lança falha.\nGanhas um segundo.\nOs teus reorganizam-se.","choices":[],"autoTarget":148,"isFinal":false},"148":{"id":148,"text":"Gritas em árabe quebrado:\n— Imshi! Rua limpa!\nOs inimigos hesitam. Um olha para trás, como se esperasse ordem.\nOs teus aproveitam a confusão e avançam.","choices":[],"autoTarget":149,"isFinal":false},"149":{"id":149,"text":"O dono da casa mostra-te uma saída.\nEle leva-te por um corredor interior, passa por uma arrecadação, e aponta para uma porta baixa que dá para um beco.\n— Por aqui… ninguém usa…\nTu sais. O beco é estreito, mas leva-te para trás do portão.","choices":[],"autoTarget":150,"isFinal":false},"150":{"id":150,"text":"Insistes na improvisação.\nTentas outra vez com o ferro de lareira. A tranca range, mas não cede.\nO guarda ao fundo já ouviu. Ele grita.\nAgora é tarde.","choices":[],"autoTarget":151,"isFinal":false},"151":{"id":151,"text":"Entras pela porta de ferro.\nUm sapateiro segura uma lança como se fosse uma agulha demasiado grande. As mãos dele tremem — mas os olhos não fogem.\nO corredor antigo cheira a mofo e abandono. À frente, uma escada sobe.\nOuves passos atrás — os homens que deixaste? Ou outros?\nAvanças.\nA escada dá para uma galeria estreita, por trás do mecanismo do portão.\nEstás no sítio certo.","choices":[],"autoTarget":152,"isFinal":false},"152":{"id":152,"text":"Calas os dois homens.\nRápido. Limpo. Silencioso.\nOs corpos escorregam para trás do barril.\nNinguém viu.","choices":[],"autoTarget":153,"isFinal":false},"153":{"id":153,"text":"Obrigas um deles a falar.\n— Onde está a tranca principal?\nEle treme e aponta para cima.\n— Mecanismo… no piso de cima… atrás do portão…\n— Quantos guardas?\n— Só… só um. Às vezes dois.\nTu decides o que fazer com ele.","choices":[],"autoTarget":154,"isFinal":false},"154":{"id":154,"text":"O homem-chave abre a primeira tranca.\nEle mexe no mecanismo com dedos trémulos. O ferro range, depois cede.\nUma tranca aberta. Falta a segunda.\nLá fora, ouvem-se vozes. Alguém está a chegar.","choices":[{"text":"confias no instinto e segues o fluxo da rua","target":162}],"autoTarget":null,"isFinal":false},"155":{"id":155,"text":"Matas o segundo guarda.\nO homem-chave vê e fica branco. Agora depende completamente de ti.\n— Abre — dizes. — Agora.\nEle abre a primeira tranca.","choices":[],"autoTarget":156,"isFinal":false},"156":{"id":156,"text":"Atacas o segundo guarda.\nEle tenta gritar, mas tu és mais rápido. Cai sem som.\nAgora tens dois corpos.","choices":[],"autoTarget":157,"isFinal":false},"157":{"id":157,"text":"Tentas enganá-lo.\n— Sou da ronda. Há movimento lá fora. Vem ver.\nEle hesita. Aproxima-se.\nQuando está perto o suficiente, tu atacas.\nNão é limpo, mas é eficaz.","choices":[],"autoTarget":158,"isFinal":false},"158":{"id":158,"text":"“Limpar” a rua.\nAvanças com os teus para a rua onde a resistência se organiza.\nÉ um massacre. Eles não estão preparados para um ataque tão rápido.\nA rua fica vossa.\nMas o preço: civis mortos, crianças a chorar, casas a arder.\nO alfaqui, se ainda está vivo, nunca vai perdoar isto.\nFINAL ALTERNATIVO — “VITÓRIA SUJA”\nConquistaste a rua, mas perdeste a possibilidade de rendição. Lisboa vai cair a ferro e fogo, e o teu nome será lembrado como o homem que abriu a porta para o massacre.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"159":{"id":159,"text":"Paras para ajudar o homem ferido.\nEle olha-te com gratidão e medo.\n— Obrigado… — murmura.\nTu chamas outro homem para o arrastar.\nPerdeste segundos. Mas ganhaste algo que não sabias que querias: humanidade.\nMais tarde, no meio da rua tomada, alguém te tocou no ombro. Era ele. — Devias ter-me deixado morrer — disse. Mas não foi embora.","choices":[{"text":"vês uma oportunidade rara e mudas o plano à última hora","target":161}],"autoTarget":null,"isFinal":false},"161":{"id":161,"text":"Interrompes os passos.\nSais do mecanismo e deslizas para a escada.\nOs passos sobem. Uma tocha acende-se no patamar.\nDois homens. Talvez três.","choices":[{"text":"atacas o primeiro quando ele virar a esquina","target":164}],"autoTarget":null,"isFinal":false},"162":{"id":162,"text":"Forças a segunda tranca.\nTu e o largo empurram como se estivessem a tentar partir o mundo.\nO ferro não cede.\nO dono da casa geme, quase a chorar.\nDo corredor, a tocha aproxima-se.\nA segunda tranca dá um estalo seco — alto demais.\nUm guarda aparece à porta.","choices":[{"text":"te atiras ao guarda para o calar antes do grito","target":166}],"autoTarget":null,"isFinal":false},"163":{"id":163,"text":"Divides forças.\n— Segura isto — dizes ao largo. — Não largues.\nO largo fixa as mãos no braço de madeira.\nTu vais para a escada.\nNo patamar, um guarda já subiu.\n— Quem és tu?!\nEscolhe depressa.","choices":[{"text":"atacas imediatamente para o calar","target":166}],"autoTarget":null,"isFinal":false},"164":{"id":164,"text":"Violência silenciosa no patamar.\nApanhas o primeiro guarda no ângulo certo. A tocha cai e apaga-se.\nO segundo guarda vê a sombra cair. Saca da lâmina.\nEle vai gritar.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":165},{"text":"te lanças e aceitas o risco de barulho para o impedir","target":170}],"autoTarget":null,"isFinal":false},"165":{"id":165,"text":"Enganas como habitante aterrado.\nAbres a porta do quarto, puxas o cobertor para cima do ombro.\n— O que é?! Há homens na rua!\nO guarda hesita. A tocha varre-te a cara.\nEle responde em árabe, impaciente, e aponta para trás: — Fica aqui!\nO segundo guarda tenta passar por ti para ver a divisão do mecanismo.","choices":[{"text":"o atacas no instante em que passa","target":166}],"autoTarget":null,"isFinal":false},"166":{"id":166,"text":"Atiras-te ao guarda.\nA tua mão tapa-lhe a boca. O teu joelho bate-lhe na coxa. Ele dobra-se.\nA tocha cai e ilumina-te o rosto.\nEle tenta gritar. Só sai ar e saliva.\nLá em baixo, o largo grita:\n— Já quase!","choices":[{"text":"o deixas inconsciente e voltas ao mecanismo","target":167}],"autoTarget":null,"isFinal":false},"167":{"id":167,"text":"A tranca cede.\nTu voltas a correr para a divisão. O largo está com os braços a tremer.\nTu agarras a segunda tranca e puxas.\nO ferro desliza. O braço de madeira desce.\nO portão maior mexe.\nPrimeiro um palmo. Depois dois.\nDo lado de fora… ouves um rugido contido.\nMas ainda falta uma trava menor, simples, que impede o portão de abrir de vez.\nE do corredor, ouvem-se novamente passos.","choices":[{"text":"desces já para tirar a trava final por dentro do portão","target":175}],"autoTarget":null,"isFinal":false},"168":{"id":168,"text":"Usas o dono da casa como escudo.\nAgarras o homem pelo ombro e puxas-o para a porta.\n— Um som e morre!\nO homem soluça. A mulher grita baixinho.\nO guarda congela… mas não recua.\nEle ergue a lança.","choices":[],"autoTarget":169,"isFinal":false},"169":{"id":169,"text":"Saltas pela janela.\nCais num pátio interior, aterras mal, rolas.\nA dor sobe-te pela perna. Não partiu — mas avisa.\nPor fora, ouves o barulho do portão a mexer.","choices":[],"autoTarget":170,"isFinal":false},"170":{"id":170,"text":"Impedes o grito, mesmo com risco.\nLanças-te sobre o segundo guarda. Ele bate contra a parede e a lâmina cai.\nMas ele consegue soltar um som alto.\nLá fora, uma resposta: um toque curto de corno.\nO alarme começou.","choices":[],"autoTarget":171,"isFinal":false},"171":{"id":171,"text":"Tentativa de imobilização.\nAgarras-lhe o braço, tapas-lhe a boca, tentas derrubar.\nEle luta. Consegues atirá-lo ao chão, mas ele acerta-te com o cotovelo.\nA dor faz-te perder o controlo.\nEle solta um som.\nA noite responde.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":172}],"autoTarget":null,"isFinal":false},"172":{"id":172,"text":"Gritas por “ajuda”.\n— Acordem! Há gente na rua!\nOs guardas reagem, confusos. Um tenta calar-te, o outro tenta correr para o mecanismo.\nA casa explode em movimento.\nO que fazes?","choices":[],"autoTarget":173,"isFinal":false},"173":{"id":173,"text":"Calas para sempre.\nUm gesto curto. Um fim.\nO silêncio volta, pesado.\nMas o sangue tem preço.","choices":[],"autoTarget":174,"isFinal":false},"174":{"id":174,"text":"Escondes o corpo.\nArrastas o guarda para trás de um baú. Empurras um pano por cima.\nPerdeste segundos.\nLá em baixo, o largo grita:\n— Agora!","choices":[],"autoTarget":175,"isFinal":false},"175":{"id":175,"text":"Desces para tirar a trava final.\nCorres escada abaixo, atravessas a casa, sais para a rua interior junto ao portão.\nO portão está meio aberto. A fenda deixa entrar sombras do lado de fora — homens teus.\nDo lado de dentro, guardas muçulmanos correm na tua direção.\nTu vês a trava: um ferro simples, colocado para impedir abertura total.","choices":[{"text":"te atiras à trava e a arrancas mesmo com o risco de seres ferido","target":178}],"autoTarget":null,"isFinal":false},"176":{"id":176,"text":"Tentas partir a trava à força.\nPuxas, empurras, fazes do portão um instrumento de barulho.\nA trava resiste… e depois estala.\nO problema: esse estalo é um anúncio para a cidade inteira.\nLá em baixo, guardas correm.","choices":[],"autoTarget":177,"isFinal":false},"177":{"id":177,"text":"Divides a defesa.\nO largo desce para a trava. Tu ficas no topo, a segurar a posição.\nDo corredor, entram dois guardas.\n— Ali!","choices":[],"autoTarget":178,"isFinal":false},"178":{"id":178,"text":"Atiras-te à trava.\nO ferro está ali, pequeno, ridículo — e no entanto segura um portão como se segurasse um reino.\nAtiras-te para a trava com as duas mãos. Sentes o metal frio cortar-te a pele.\nO guarda mais próximo chega ao mesmo tempo que tu. A lâmina dele vem baixa.\nTu puxas. O ferro não cede.\nPuxas outra vez. A lâmina raspa-te o lado.\nA trava cede com um estalo.\nE nesse instante, o portão abre mais um palmo… dois… três…\nO guarda tenta recuar.\nDo lado de fora, sombras tuas empurram.\nO portão abre de vez.\nO som é enorme. Madeira e ferro a gritarem juntos.\nO assalto começou em massa.\nEncostas-te à parede, por um instante. A tua mão treme. Não sabes se é ferida ou cansaço. À tua volta, homens passam como água. Lisboa, lá fora, arde em silêncio. Há qualquer coisa de belo nisto. Qualquer coisa de terrível.\nDepois levantas-te. A noite não acabou.","choices":[{"text":"finges fraqueza e preparas a faca para quando o traidor chegar","target":182}],"autoTarget":null,"isFinal":false},"179":{"id":179,"text":"Derrubas o guarda primeiro.\nAtiras-te ao guarda com o ombro. Ele cai, mas não fica quieto.\nO segundo guarda chega — e agora tens dois.\nA trava ainda está lá.","choices":[],"autoTarget":180,"isFinal":false},"180":{"id":180,"text":"Mandas forçar de fora.\nFicas no mecanismo, a puxar e a segurar.\nDo lado de fora, os teus empurram em massa.\nA trava cede a golpes, mas lentamente.\nE os guardas do interior começam a organizar-se.","choices":[],"autoTarget":181,"isFinal":false},"181":{"id":181,"text":"Ficas a atrasar os guardas.\nO primeiro entra com lança curta. Tu desvias-te.\nO segundo vem com tocha.\nLá em baixo, o largo grita:\n— Estou na trava!\nUm estalo metálico.\nQue decides?","choices":[],"autoTarget":182,"isFinal":false},"182":{"id":182,"text":"Contra-emboscada.\nFinges que estás pior do que estás.\nO homem do teu lado aproxima-se, agachando-se.\n— Aguenta — diz ele, baixo.\nMas tu vês a mão dele ir para a lâmina.\nA tua faca sobe do nada e encontra-lhe o antebraço.\nEle dá um som curto de surpresa e dor.\n— Diz-me quem te mandou.\nEle sorri, mesmo ferido.\n— Não precisaram mandar. Eu só… aproveitei.","choices":[{"text":"o matas aqui e já","target":189}],"autoTarget":null,"isFinal":false},"184":{"id":184,"text":"Desapareces na massa.\nMisturas-te com corpos e metal. Deixas de ser personagem e voltas a ser sombra.\nAgora o combate espalha-se pela rua larga.","choices":[{"text":"vais atrás do traidor no caos","target":189}],"autoTarget":null,"isFinal":false},"185":{"id":185,"text":"Usas o portão como armadilha.\nPões-te de lado, usas a madeira como cobertura, e puxas o guarda para o funil.\nEle entra sem querer. Tu empurras-lhe o ombro contra a borda do portão.\nEle fica preso entre madeira e parede.\nArrancas a trava.\nO portão abre mais.","choices":[],"autoTarget":186,"isFinal":false},"186":{"id":186,"text":"Fuges e deixas o portão meio aberto.\nO assalto entra… mas entra mal. A entrada vira moenda.\nHomens teus morrem a empilhar-se.\nO grito da cidade sobe.\nTu foges vivo… mas o preço é alto.\nFINAL ALTERNATIVO — “O FUNIL”\nA conquista acontece, mas tu desapareces como criminoso, não como peça decisiva.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"187":{"id":187,"text":"Ficas e confias na força de fora.\nA trava resiste, resiste… e de repente cede com um estalo.\nMas tarde.\nOs primeiros homens entram e encontram lanças prontas.","choices":[],"autoTarget":188,"isFinal":false},"188":{"id":188,"text":"Mais segundos.\nA lança vem outra vez. Tu desvias-te e bates com o punho na garganta do guarda.\nO da tocha tenta gritar. Tu tapas-lhe a boca.\nLá em baixo, o portão dá um gemido enorme.\nO largo grita:\n— ABRIU!","choices":[],"autoTarget":189,"isFinal":false},"189":{"id":189,"text":"O acerto de contas.\nEncontras o traidor no caos. Ele saca da lâmina.\n— Achavas que o rei dá prémios a ladrões?\nTu respondes com rapidez.\nA luta é curta, suja. A lâmina dele corta-te a manga. A tua encontra-lhe o lado.\nEle cai, agarrando-te o pulso.\n— Não és… ninguém…\nE tu dizes:\n— Eu abri Lisboa.\nEle morre com ódio nos olhos.\nQual é o teu próximo passo?","choices":[{"text":"vais procurar o emissário para garantir que o rei cumpre a palavra","target":191}],"autoTarget":null,"isFinal":false},"190":{"id":190,"text":"Tentas fazê-lo falar.\nArrastas o homem para um canto. Ele ri-se com sangue nos dentes.\n— Queres nomes?\nEle tenta cuspir.\n— Há… gente de dentro… que prefere rendição… e gente de fora… que prefere sangue…\nAntes que diga mais, um golpe inimigo tenta acertar-te.\nO momento perde-se.","choices":[],"autoTarget":191,"isFinal":false},"191":{"id":191,"text":"Procuras o emissário.\nEncontras-o perto do portão. Ele vê o teu sangue.\n— Estás vivo.\nEle aproxima-se e fala ao ouvido:\n— Agora tens testemunhas. Isso salva-te.\nE chama um homem:\n— Este é o ladrão. Ele abre portas. Quem o tocar, responde ao rei.\nNota: Se chegaste aqui vindo de um esconderijo (211), o homem do submundo conduziu-te por dentro de casas e pátios até junto do emissário. Ele sabe que estiveste escondido. Não pergunta. Usa a informação como quiser.\nO emissário não te dá descanso:\n— A entrada tem de aguentar. Se perdermos a rua, perdemos o momento.","choices":[{"text":"vais consolidar a rua e manter a passagem aberta","target":192}],"autoTarget":null,"isFinal":false},"192":{"id":192,"text":"Consolidar.\nDe uma janela pendem panos de linho a secar, agora manchados de fumo. A guerra não escolhe o que estraga.\nNota de cerco: há mais tochas do que havia há minutos; a noite está a ser varrida palmo a palmo.\nAgora é guerra de rua. Tu orientas homens para segurar cantos.\nO magro desapareceu na confusão. Um homem disse que o viu a correr para um beco, outro disse que o viu cair. Tu não tiveste tempo de procurar. Às vezes, na guerra, os homens simplesmente somem.\nO largo vira-se para travar um contra-ataque.\nA rua larga começa a ficar tua.\nDo interior da cidade, uma resposta organizada: guardas a formar linha, com lanças e escudos.\nE tu estás ferido.","choices":[{"text":"ficas na linha da frente para provar valor","target":197}],"autoTarget":null,"isFinal":false},"193":{"id":193,"text":"Ponto alto.\nSobes por uma escada. Vês o portão e a rua principal como um mapa vivo.\nVês também algo que te faz perceber a magnitude: do lado de fora, há mais homens a aproximarem-se.\nE vês, ao longe, perto da muralha, um movimento diferente: alguém a tentar fechar uma passagem secundária.","choices":[{"text":"desces para impedir que fechem a passagem secundária","target":198}],"autoTarget":null,"isFinal":false},"194":{"id":194,"text":"FINAL ALTERNATIVO — “A SOMBRA LIVRE”\nFazes o que sempre soubeste fazer: sobreviver.\nMisturas-te, sais por um beco, atravessas um pátio, desapareces numa Lisboa em chamas e medo.\nFicas vivo. Livre.\nMas a liberdade tem um preço: o rei não sabe onde estás. E quando reis não sabem, inventam.\nLisboa cairá com ou sem ti, e tu serás sempre o homem que abriu uma porta e fechou o destino.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"195":{"id":195,"text":"Recuas para tratar do ferimento.\nO emissário faz um gesto curto. Dois homens puxam-te para trás, para uma casa tomada.\nUm homem com mãos sujas rasga-te a camisa e faz um penso.\n— Não está profundo — diz. — Mas se voltares a abrir… sangras até ao fim.\nLá fora, o barulho sobe.\nO emissário inclina-se:\n— Preciso de ti vivo… mas preciso da entrada aberta.","choices":[{"text":"voltas já para a rua para consolidar","target":197}],"autoTarget":null,"isFinal":false},"196":{"id":196,"text":"O plano está traçado. Agora só falta o pior: cumprir sem que a noite te traia.\nExiges ser levado ao rei.\nAtravessas a rua com escolta. Vês corpos. Vês homens a rezar. Vês cruzados.\nE então vês o centro: um homem montado, perto da abertura, rodeado por guardas e estandartes.\nO emissário fala ao ouvido dele. O homem montado olha para ti.\n— Tu és o que abre portas?\n— Sou.\nEle inclina-se.\n— Então abre-me Lisboa… e eu cumpro a palavra.\nNão há glória aqui — só uma cidade a prender a respiração.\nDo alto, vês Lisboa como sombra e brasa: telhados baixos, fumo a subir em colunas finas, o Tejo a reflectir a lua como lâmina.\nDurante um instante, tudo abranda.","choices":[{"text":"voltas ao combate para segurar a entrada","target":197}],"autoTarget":null,"isFinal":false},"197":{"id":197,"text":"Por um instante, a noite abranda. Lá fora, Lisboa respira entre fumo e silêncio — o rio devolve um brilho cansado, como uma prece partida. A tua mão fecha-se e abre-se: ainda estás vivo. E isso, por si só, já é uma espécie de milagre.\nLinha da frente.\nVoltas para a rua larga. A entrada está aberta, mas não está ganha.\nÀ frente, uma linha inimiga forma-se.\nO largo está lá, ofegante. O magro (se ainda está contigo) surge ao teu lado:\n— Estão a vir por trás… por um beco.","choices":[{"text":"ajudas a segurar a linha da frente","target":203}],"autoTarget":null,"isFinal":false},"198":{"id":198,"text":"Passagem secundária.\nCorres pelo beco. Inimigos a tentar fechar a passagem com traves e móveis.\nQuatro homens. Dois seguram madeira. Um vigia. Um quarto — mais acima — segura um corno.\nEscolhe depressa.","choices":[{"text":"atacas o homem do corno primeiro","target":204}],"autoTarget":null,"isFinal":false},"199":{"id":199,"text":"Ficas a orientar.\nDo ponto alto, vês a rua como um tabuleiro. Gritas direções curtas.\nAlguns obedecem. Vês o flanco a ameaçar fechar-se.","choices":[],"autoTarget":200,"isFinal":false},"200":{"id":200,"text":"Avanças para dentro.\nO portão abriu Lisboa, mas Lisboa ainda não caiu.\nAproveitas o caos e segues por uma rua lateral.\nVês um alvo: uma pequena torre com um sino — posto de alarme. Perto dela, homens a reunir-se.\nUm deles tem roupa de qualidade e postura de mando.","choices":[{"text":"tentas aproximar-te e ouvir o que estão a planear","target":208}],"autoTarget":null,"isFinal":false},"201":{"id":201,"text":"Ficas escondido.\nA tua ferida pulsa. Ouves a batalha como mar.\nUm homem entra na casa — não dos teus. Pára ao ver-te.\nEle tem uma faca pequena.\n— Tu — diz ele. — O que abre portas.\nEle aproxima-se.\n— Posso vender-te… ou posso esconder-te.","choices":[],"autoTarget":202,"isFinal":false},"202":{"id":202,"text":"O rei dá ordem pública.\n— Este homem é meu. Quem o ferir sem ordem, morre.\nAgora tens escolta real.","choices":[],"autoTarget":203,"isFinal":false},"203":{"id":203,"text":"A linha da frente segura.\nFicas ao lado do largo. A linha inimiga avança.\nAproveitas a abertura e puxas um homem pela lança. O largo bate nele.\nMas a linha não quebra.\nE, ao lado, ouves o corno pequeno outra vez — o flanco ainda está em risco.","choices":[],"autoTarget":204,"isFinal":false},"204":{"id":204,"text":"O homem do corno.\nAtiras-te a ele antes que toque. Ele vê-te no último segundo e levanta o corno.\nTu tapas-lhe a boca e empurras-lhe o corno contra o peito. O som é abafado.\nMas ele debate-se e derruba uma trave.\nOs outros três viram-se.","choices":[{"text":"acabas com o homem do corno e depois lutas com os restantes","target":213}],"autoTarget":null,"isFinal":false},"205":{"id":205,"text":"Atiras a trave.\nPegas numa madeira e arremessas. A trave acerta num dos homens que carrega, derruba-o.\nO outro perde o equilíbrio.\nMas o vigia corre para o corno.\nO que fazes?","choices":[],"autoTarget":206,"isFinal":false},"206":{"id":206,"text":"Blefe de autoridade.\nGritas em árabe: — Parem! Ordem do comandante!\nDois hesitam. O do corno hesita um segundo.","choices":[],"autoTarget":207,"isFinal":false},"207":{"id":207,"text":"Continuas a orientar.\nFicas no alto. Vês os teus a reagir.\nE então vês o que te preocupa: a passagem secundária está quase a ser fechada.","choices":[],"autoTarget":208,"isFinal":false},"208":{"id":208,"text":"Aproximas-te para ouvir.\nA torre pequena está protegida por uma parede baixa. Aproximas-te encostado a sombras.\nDo outro lado, ouves homens a falar em árabe, depressa.\nE ouves uma palavra que reconheces: bab — porta. Depois nahr — rio.\nO homem de roupa de qualidade fala com frieza.\nEle diz algo que traduzes em intenção: se fecharmos as ruas, isolamos os invasores e matamos por sectores.","choices":[{"text":"tentas capturar o homem de roupa de qualidade","target":218}],"autoTarget":null,"isFinal":false},"209":{"id":209,"text":"Atacas o posto de alarme.\nSaltas a parede baixa. Um guarda vê-te e grita — mas o grito não sobe porque tu já estás nele.\nO segundo guarda tenta correr para puxar o sino.\nTu atiras-lhe uma pedra — acerta-lhe no ombro — ele tropeça.\nA tua mão chega ao sino, ao suporte, à corda. Puxas com força.\nA corda cede. O sino cai com um som de metal a bater em pedra.\nOs homens ao lado recuam.\nMas uma lâmina raspa-te a perna.","choices":[],"autoTarget":210,"isFinal":false},"210":{"id":210,"text":"Pagas com informação.\nDizes ao homem do submundo uma verdade pequena: uma rota, um pátio, uma porta interior.\nEle sorri.\n— Então anda.\nEle conduz-te por dentro de uma casa e sai por uma porta traseira. Leva-te a uma travessa onde o barulho da batalha é menos.\n— Se te quiserem morto — sussurra — não será com inimigos. Será com amigos.\nEle aponta para uma rua onde vês homens do teu lado a arrastar um corpo.","choices":[],"autoTarget":211,"isFinal":false},"211":{"id":211,"text":"Aceitas ser escondido.\nEle leva-te para baixo, para um porão com cheiro a vinho e ratos. Dá-te água e um pano.\n— Aqui ninguém te encontra — diz. — A não ser que eu queira.\nLá fora, Lisboa arde.\nHoras passam.\nDepois, passos.\nA porta abre-se e o homem volta, sério:\n— Os teus ganharam a rua. Mas há gente a perguntar por ti. E isso… é mau.","choices":[],"autoTarget":212,"isFinal":false},"212":{"id":212,"text":"Golpe ousado na linha.\nAvanças, baixo, e cortas por dentro da linha.\nO homem de ordens levanta a lança — e tu puxas-lhe a haste para baixo.\nA linha abre-se um segundo. O largo entra nesse buraco.\nA disciplina estala.\nOs inimigos recuam.\nA rua ganha-se por metros.\nMas tu sentes a tua ferida a puxar-te para baixo.\nQue decides?","choices":[],"autoTarget":213,"isFinal":false},"213":{"id":213,"text":"Luta no flanco.\nO homem do corno já está quase a tocar. Tu atiras-te ao grupo.\nO primeiro leva um golpe no ombro. O segundo tenta segurar-te.\nO corno sobe. Tu apanhas-o pela ponta e esmagas contra a parede.\nO som sai abafado, mas sai.\nO aviso ecoa.","choices":[],"autoTarget":214,"isFinal":false},"214":{"id":214,"text":"Arrancas as traves.\nPuxas madeira como quem puxa dentes. Uma trave cede. Outra cai.\nA passagem abre-se.\nJá há passos a aproximarem-se.","choices":[],"autoTarget":215,"isFinal":false},"215":{"id":215,"text":"Gritas por ajuda.\nDois homens teus chegam. Três inimigos também.\nO flanco vira mini-batalha.","choices":[],"autoTarget":219,"isFinal":false},"216":{"id":216,"text":"Capturas um deles para obter informação.\n— Quem está a mandar?\nEle aponta com o queixo para a zona da torre.\nDiz uma palavra que soa a título.","choices":[],"autoTarget":217,"isFinal":false},"217":{"id":217,"text":"Envias homens ao flanco.\nGritas para seis homens: — FLANCO! AGORA!\nEles hesitam um segundo — e correm.\nVês a linha inimiga a falhar.\nMas também vês uma sombra conhecida do teu lado, perto do portão, a observar-te.","choices":[],"autoTarget":218,"isFinal":false},"218":{"id":218,"text":"Alvo de alto valor.\nO homem de roupa de qualidade recua. Ele tenta sair com dois guardas.\nTu aproximas-te por trás. Um guarda vê-te e move-se para te cortar o caminho.\nO homem importante vira-se e olha-te nos olhos.\n— És o ladrão — diz ele, em português com sotaque. — O que abre portas.","choices":[{"text":"tentas capturá-lo vivo e levá-lo ao emissário/rei","target":221}],"autoTarget":null,"isFinal":false},"219":{"id":219,"text":"Seguras a passagem.\nDois dos teus chegam ao flanco. Do lado inimigo, aparecem quatro homens.\nA luta é apertada.","choices":[{"text":"empurras agressivamente para os afastar já","target":223}],"autoTarget":null,"isFinal":false},"220":{"id":220,"text":"Caças o homem do corno.\nEle foge por um beco. Tu segues.\nEntra numa zona mais escura. Armadilha: dois homens à tua espera.\nUm deles diz em português baixo:\n— Ainda respiras?","choices":[],"autoTarget":221,"isFinal":false},"221":{"id":221,"text":"Tentas capturá-lo vivo.\nAgarras-o pelo manto. Os dois guardas avançam.\nEle levanta a mão. Os guardas hesitam.\n— Podes matar-me. Mas se me levares vivo… posso abrir-te ruas sem sangue.\nQual é o teu próximo passo?","choices":[{"text":"o arrastas para fora, em direção ao emissário/rei","target":226}],"autoTarget":null,"isFinal":false},"222":{"id":222,"text":"Matas o organizador.\nUm gesto curto. O homem cai com surpresa nos olhos.\nOs guardas gritam e avançam.\nTu recuas para a sombra.","choices":[],"autoTarget":223,"isFinal":false},"223":{"id":223,"text":"Empurras agressivamente.\nAvanças. O beco vira confusão.\nO quarto inimigo tenta recuar para ir buscar traves.\nTu corres e dás-lhe um golpe curto.\nA passagem respira.\nMas o grito da mulher e o barulho trouxeram atenção.","choices":[],"autoTarget":224,"isFinal":false},"224":{"id":224,"text":"Controlas o silêncio.\nRecuas um passo, encostas-te à parede.\nOs inimigos hesitam.\nTu esperas o instante em que o primeiro pisa a pedra solta.\nSaltas. Apanhas-lhe a garganta. A faca faz o resto.\nOs outros recuam.\nO flanco aguenta.","choices":[],"autoTarget":229,"isFinal":false},"225":{"id":225,"text":"Lutas na armadilha.\nEstás ferido, cansado.\nO primeiro homem avança. O segundo tenta contornar.\nTu recuas para um degrau. Um golpe corta a manga do primeiro.\nO segundo tenta agarrar-te por trás. Tu rolas e empurras o primeiro contra a parede.\nO segundo acerta-te no ombro. Dor.","choices":[],"autoTarget":226,"isFinal":false},"226":{"id":226,"text":"Arrastas o homem até ao emissário/rei.\nEle fala baixo:\n— Se o rei quer a cidade inteira… vai precisar de rendição, não só de portões.\nChegas perto do portão. O emissário vê-te e vê o prisioneiro.\n— Isto pode acabar a noite… ou pode começar outra.","choices":[{"text":"entregas o homem ao emissário","target":232}],"autoTarget":null,"isFinal":false},"227":{"id":227,"text":"Segues a oferta de rendição local.\nEle conduz-te por ruas onde homens dele te deixam passar.\nChegam a um pátio. Um pequeno grupo está reunido, armas baixas.\n— Eu posso entregar-te esta zona sem sangue. Mas quero que o rei prometa vida a famílias.","choices":[],"autoTarget":228,"isFinal":false},"228":{"id":228,"text":"Ficas para lutar mais.\nOs guardas avançam.\nTu consegues derrubar um… mas o segundo acerta-te na costela.\nO terceiro vem.","choices":[],"autoTarget":229,"isFinal":false},"229":{"id":229,"text":"O flanco segura.\nA passagem secundária fica aberta. Os teus conseguem circular.\nAgora, a entrada já não é apenas “portão aberto”. É rede.\nO barulho da batalha começa a afastar-se.\nUm homem teu chega a correr:\n— O emissário chama por ti. Diz que… o rei quer ver o homem que abriu Lisboa.\nEscolhe depressa.","choices":[],"autoTarget":230,"isFinal":false},"230":{"id":230,"text":"Sobes e atacas por cima.\nSobes escadas e dás a volta por cima de um telhado baixo.\nVês os reforços inimigos a aproximarem-se em fila.\nAtiras uma telha. Acerta no primeiro. Ele cai.\nGanhas segundos.","choices":[],"autoTarget":231,"isFinal":false},"231":{"id":231,"text":"Golpe final.\nA tua faca vai ao lugar certo. O primeiro cai.\nO segundo hesita, vê o companheiro a cair e tenta fugir.\nTu agarras-lhe a capa e puxas. Ele bate com a cabeça num degrau.\nSilêncio.","choices":[],"autoTarget":232,"isFinal":false},"232":{"id":232,"text":"A política entra na guerra.\nO emissário ouve os termos, olha para o homem importante, depois para ti.\n— O rei decide — diz ele. — Mas o rei decide com vantagem.\nO homem importante mantém o queixo erguido.\n— Se me matarem, os meus lutam até ao último. Se me ouvirem… há portas que se abrem sem sangue.","choices":[],"autoTarget":233,"isFinal":false},"233":{"id":233,"text":"Interrogas antes que a política te engula.\n— Quem do meu lado te prometeu… o quê?\nEle sorri.\n— Um homem que tem medo de ladrões famosos. Um homem que quer ser lembrado como “salvador” quando a cidade cair.\nEle dá-te um nome parcial. Uma pista.","choices":[],"autoTarget":234,"isFinal":false},"234":{"id":234,"text":"O beco fecha-se.\nEstás cansado. Ferido. Sem rota limpa.\nO inimigo avança. Tu recuas. A parede acaba.\nUm golpe acerta-te no lado. A tua faca cai.\nO mundo inclina-se.\nFINAL MAIOR — “A PORTA E O PREÇO”\nAbres o portão que muda a história… mas pagas com o corpo. Lisboa cai, e o teu nome vive como rumor: para uns, herói; para outros, criminoso útil.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"235":{"id":235,"text":"Ficas para garantir que ninguém te apaga.\nFicas ao lado do emissário como sombra armada.\nChega um mensageiro com ordem curta. O emissário lê, acena.\nO homem importante fecha os olhos por um instante.\nO emissário vira-se para ti:\n— O rei aceita rendições locais… com condições. E quer-te vivo para abrir mais portas… ou para seres prova de que a coroa cumpre.\nNota para o leitor: A cidade à tua frente ainda não está totalmente tomada. O posto de alarme e a resistência organizada continuam ativos. Se aceitares a missão do rei, prepara-te para avançar para dentro.","choices":[],"autoTarget":236,"isFinal":false},"236":{"id":236,"text":"O portão tenta fechar.\nChegas ao vão e vês a loucura: homens inimigos a empurrar uma carroça atravessada, outros a arrastar uma trave. Não precisam de fechar completamente — basta estreitar.\nDo lado de fora, ainda entram homens. Do lado de dentro, já há corpos e gritos.\nE então vês algo que te faz gelar: não há traidor. Há apenas pânico, civis a tentar fechar o que já não lhes pertence.\nUm velho empurra a carroça com a última força que tem.","choices":[{"text":"atacas os homens da carroça e abres o vão à força","target":237}],"autoTarget":null,"isFinal":false},"237":{"id":237,"text":"Abres o vão à força.\nAtiras-te à carroça. O largo vem contigo. Um dos teus agarra na trave e puxa.\nA carroça mexe-se. Um palmo. Depois outro.\nO velho cai. Alguém grita.\nO vão abre o suficiente.\nDo lado de fora, entra uma onda de cruzados. Eles empurram sem perguntar.\nO portão fica aberto.\nO que fazes?","choices":[],"autoTarget":238,"isFinal":false},"238":{"id":238,"text":"Tentas falar com o velho.\nApanhas-lhe o braço.\n— Pára. Já chega.\nEle treme. Olha para ti com olhos que já viram demasiados cercos.\n— Vocês vão matar-nos a todos.\nTu não tens resposta para isso. Mas manténs-lhe o braço.\n— Se fechares agora, matas mais.\nEle hesita. Larga a trave.","choices":[{"text":"o levas para trás, para fora do perigo","target":239}],"autoTarget":null,"isFinal":false},"239":{"id":239,"text":"Coordenas “empurrem para fora!”\nSobes para uma pedra alta, gritas por cima do ruído:\n— EMPURREM PARA FORA! DEIXEM O VÃO LIVRE!\nAlguns ouvem. Aos poucos, o movimento sincroniza.\nA carroça sai do eixo. A trave solta-se. O portão respira.\nO velho, amparado por dois homens, é levado para uma casa.","choices":[],"autoTarget":240,"isFinal":false},"240":{"id":240,"text":"Escolta real.\nDois guardas do rei acompanham-te.\nAtravessas ruas com combate em bolsas. A escolta abre-te caminho.\nChegas perto da casa grande adjacente ao posto de comando. Vozes em árabe saem de lá dentro.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":241},{"text":"entras pela casa para cortar o comando por trás","target":242}],"autoTarget":null,"isFinal":false},"241":{"id":241,"text":"Autorização do rei.\nO rei ouve-te sem mudar de expressão.\n— Quem tentar matar-te sem minha ordem… morre.\nE depois acrescenta:\n— Mas traz-me prova quando puderes. A palavra sem prova é lama.","choices":[{"text":"levas o traidor vivo ao emissário","target":246}],"autoTarget":null,"isFinal":false},"242":{"id":242,"text":"Entrada pela casa grande.\nA porta lateral está trancada, mas uma janela baixa deixa-se convencer. Entras.\nLá dentro, o ar é pesado, cheiro a incenso velho e suor.\nO corredor leva a um pátio interior. No pátio, duas sombras conversam em árabe. Uma delas segura um rolo selado.\nHá uma escada que sobe para o piso de cima — provavelmente para uma varanda com vista para o posto de alarme.","choices":[{"text":"sobes em silêncio para apanhar quem manda no piso de cima","target":247}],"autoTarget":null,"isFinal":false},"243":{"id":243,"text":"Matas o traidor em silêncio.\nPuxas-lhe o manto. A lâmina entra onde não há tempo para palavras. Ele cai atrás da carroça, engolido pelo caos.\nNinguém vê.\nO portão continua a engolir homens.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":244}],"autoTarget":null,"isFinal":false},"244":{"id":244,"text":"Saltas para a sombra e apanhas a mão primeiro.\nO homem aproxima-se, a mão escondida. Tu sais da luz e apareces-lhe no ângulo morto.\nAgarras-lhe o pulso. A lâmina cai.\nEle arregala os olhos.\nQue decides?","choices":[{"text":"o matas ali mesmo","target":246}],"autoTarget":null,"isFinal":false},"245":{"id":245,"text":"Ataque de frente com escolta.\nChegas à zona do posto por uma rua mais larga. A escolta empurra gente para trás.\nUm homem inimigo vê-te, levanta o corno… hesita ao ver os guardas do rei.\nA escolta avança. Derrubam o homem do corno.\nMas do lado direito, surge uma linha de lanças. Do esquerdo, arremessam pedras.","choices":[],"autoTarget":246,"isFinal":false},"246":{"id":246,"text":"Prova para o emissário.\nArrastas o homem (ou o traidor inconsciente) até à zona do portão.\nO emissário vê-te e vem ao teu encontro.\n— Que é isso?\nMostras o símbolo, o cinto, o detalhe. Prova.\nO emissário não faz drama. Faz contabilidade.\n— Um problema a menos.\nEle chama dois homens e manda levá-lo.\n— Agora tens proteção… e tens missão. O rei quer o comando inimigo cortado. Já.","choices":[],"autoTarget":247,"isFinal":false},"247":{"id":247,"text":"Sobes em silêncio.\nA escada range, mas tu pões o pé nos sítios certos.\nO piso de cima tem um corredor com tapetes gastos e portas fechadas.\nAo fundo, uma varanda interior aberta para o pátio. Dali vês, através de uma frincha, o posto de alarme.\nE lá está ele: um homem com postura de mando, a falar baixo com outro.\nAo lado dele, o corno está pousado.","choices":[{"text":"o neutralizas em silêncio por trás","target":250}],"autoTarget":null,"isFinal":false},"248":{"id":248,"text":"Roubas o rolo selado.\nAtravessas o pátio. As duas sombras estão de costas.\nUma segura o rolo como se fosse extensão do braço.\nTu aproximas-te e arrancas o rolo num movimento só.\nA sombra vira-se tarde.\nMas o rolo tem cera e cordel. Barulho. Pequeno, mas real.\nUma delas dá dois passos para o corno.","choices":[{"text":"foges com o rolo para o piso de cima e procuras saída","target":252}],"autoTarget":null,"isFinal":false},"249":{"id":249,"text":"Atacas as duas sombras.\nA primeira cai com um golpe curto. A segunda tenta correr para o corno.\nConsegues derrubá-la antes que toque.\nSilêncio no pátio.\nMas alguém no piso de cima abriu uma porta. Passos.","choices":[],"autoTarget":250,"isFinal":false},"250":{"id":250,"text":"Precisas de silêncio perfeito.\nAproximas-te do homem de mando por trás. Ele não te viu.\nQuando estás a um palmo, ele diz uma frase em árabe:\n— Fechem ruas. Matem por sectores.\nTu tapas-lhe a boca e puxas para trás.\nO outro homem reage e tenta correr — para o corno, para a escada.","choices":[{"text":"deixas o homem de mando cair e corres para impedir o outro de tocar o corno","target":254}],"autoTarget":null,"isFinal":false},"251":{"id":251,"text":"Atiras o corno.\nRoubas o corno da mesa e atiras-o pela varanda.\nEle cai no pátio e parte-se com um estalo seco.\nO homem de mando vira-se, furioso — e vê-te.\n— Tu… és o ladrão.\nEle saca de uma lâmina pequena e recua.\nQual é o teu próximo passo?","choices":[{"text":"o atacas já para o impedir de fugir","target":255}],"autoTarget":null,"isFinal":false},"252":{"id":252,"text":"Fuga com o rolo.\nSobes escadas com o rolo apertado ao peito. A cera parte-se um pouco. Não importa.\nEncontras uma janela estreita. Dá para telhados.\nMas ouves passos a subir atrás.","choices":[],"autoTarget":253,"isFinal":false},"253":{"id":253,"text":"Emboscada na casa.\nEscolhes um canto escuro junto à escada.\nPassos descem. Uma tocha aparece. Depois outra.\nDois homens. Talvez três.","choices":[{"text":"atacas o primeiro e tentas calar os outros em sequência","target":259}],"autoTarget":null,"isFinal":false},"254":{"id":254,"text":"O grito que não pode existir.\nDesces atrás do homem como sombra a cair. Ele tropeça, recupera. Está quase na varanda.\nTu saltas e agarras-lhe o manto por trás.\nEle debate-se, tenta puxar o ar para gritar.\nTu tapas-lhe a boca e atiras-o contra a parede.\nO som é surdo. O corpo amolece.\nSilêncio.\nLá fora, a coordenação inimiga falha. Menos cornos. Menos resposta.\nA cidade ficou mais cega.","choices":[],"autoTarget":255,"isFinal":false},"255":{"id":255,"text":"Cortas a cabeça.\nO homem de mando tenta recuar para a porta. Tu já estás em cima dele.\nA lâmina dele é pequena; a tua intenção é maior.\nUm golpe curto. Depois outro.\nEle cai.\nO outro homem (o ajudante) dá um passo atrás, olhos enormes, e corre para a escada.","choices":[],"autoTarget":256,"isFinal":false},"256":{"id":256,"text":"Usas o homem de mando como escudo.\nAgarras-o e encostas-lhe a lâmina ao pescoço.\nO outro homem hesita.\n— Abre caminho ou ele morre.\nO homem de mando cospe:\n— Não liguem. Matem-no.\nO outro hesita. Depois avança.","choices":[],"autoTarget":257,"isFinal":false},"257":{"id":257,"text":"Armadilha no corredor.\nEscondes-te atrás de uma cortina pesada.\nO homem de mando entra no corredor, cauteloso. A lâmina à frente.\nQuando passa, tu sais da sombra.\nEle reage tarde.","choices":[],"autoTarget":258,"isFinal":false},"258":{"id":258,"text":"Prova e inteligência.\nPegas no rolo selado e rasgas a cera.\nVês o essencial: nomes, pontos, ordens para fechar ruas, matar por sectores, cortar reforços.\nIsto é a cidade a tentar transformar a tua vitória em armadilha.\nCorres.\nEncontras o emissário perto do portão. Mostras o rolo.\nEle lê em silêncio.\n— Isto vale mil homens.\nEle manda mensageiros a correr. Vês ordens a espalharem-se.\n— Agora tenho prova de duas coisas: do inimigo… e de quem, do nosso lado, gosta de confusão.","choices":[],"autoTarget":259,"isFinal":false},"259":{"id":259,"text":"Violência em sequência.\nO primeiro homem desce a escada. Tu atacas de lado.\nEle cai sem som. O segundo ainda está a virar-se.\nTu já estás nele.\nO terceiro recua e grita.","choices":[],"autoTarget":260,"isFinal":false},"260":{"id":260,"text":"Foges por uma porta lateral.\nA porta dá para um beco escuro. Corres.\nAtrás, ouvem-se vozes. Procuram-te.\nDesapareces na noite.","choices":[],"autoTarget":262,"isFinal":false},"261":{"id":261,"text":"Fechas a porta para ganhar segundos.\nBates a porta do corredor e encostas o corpo.\nOuves punhos do outro lado. Vozes em árabe.\nEles empurram.\nA porta cede um palmo. Depois outro.\nTu agarras o rolo, o mapa.\nA porta estala.\nEscolhe depressa.","choices":[{"text":"saltas pela janela para telhados","target":262}],"autoTarget":null,"isFinal":false},"262":{"id":262,"text":"Telhados.\nSais pela janela e aterras num telhado baixo. A noite aqui em cima é mais fria, mas mais tua.\nAtrás, vozes na casa. Vão encontrar corpos.\nSaltas de telhado em telhado.\nDe um ponto alto, vês: as bolsas inimigas continuam, mas estão menos coordenadas. Vês o início de rendições locais.\nE vês homens teus a aproveitar para saquear casas.","choices":[],"autoTarget":263,"isFinal":false},"263":{"id":263,"text":"FINAL MAIOR — “O HOMEM QUE ABRIU LISBOA”\nO rei cumpre (por agora).\nO emissário leva-te até perto do rei.\nO rei escuta o essencial: portão aberto, comando cortado, ordens intercetadas.\n— Amanhã falamos de recompensa — diz. — Hoje falamos de vitória.\nEle levanta a voz:\n— SEGUREM AS RUAS! NÃO SE ESPALHEM! A CIDADE CAI POR PARTES!\nO emissário aproxima-se:\n— Agora és protegido. Mas também és útil. E isso dura… enquanto fores necessário.\nSobrevives. Ficas com nome. A conquista avança sector a sector, e tu tornas-te peça incómoda: um criminoso que a coroa usa e não pode admitir em voz alta.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"264":{"id":264,"text":"FINAL MAIOR — “A SOMBRA COM PROVA”\nCaça ao traidor com apoio.\nTu dizes ao emissário o nome (ou a pista).\nMinutos depois, tens dois homens discretos contigo — testemunhas.\nVão a uma rua lateral perto do portão. Lá está ele: o ambicioso útil.\nQuando te vê, empalidece.\nO emissário fala por ti:\n— Por ordem do rei.\nEle tenta correr. Tu apanhas-o pelo manto.\nA tua sobrevivência fica selada por testemunhas. A traição do teu lado é cortada ali, na mesma noite. O rei não te elogia — mas já não te pode apagar.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"265":{"id":265,"text":"Passas entre eles.\nAbres a porta no instante certo e atiras-te para a esquerda, encostado à parede.\nDois guardas entram e passam por ti sem te ver bem.\nTu escapas por um corredor e saltas para o pátio.","choices":[],"autoTarget":266,"isFinal":false},"266":{"id":266,"text":"Lutas na porta.\nA porta abre e o primeiro homem entra com lâmina. Tu acertas-lhe no pulso.\nEle grita.\nO grito chama mais.\nTu foges.","choices":[],"autoTarget":267,"isFinal":false},"267":{"id":267,"text":"Impedes o saque.\nDesces e apanhas dois homens teus a arrombar uma porta.\n— NÃO! — gritas. — Querem que a cidade se volte contra nós?!\nEles olham-te como se fosses louco.\n— E tu és quem?\nSe invocas “ordem do rei” e assumes risco político, vai para 535.","choices":[],"autoTarget":269,"isFinal":false},"269":{"id":269,"text":"Diplomacia entre saqueadores.\n— O rei vai pagar por ruas rendidas, não por saque. Quem ajudar a manter ordem será recompensado. Quem saquear… será enforcado.\nEles hesitam. Um larga o saco.\n— Quanto?\n— O suficiente para não precisares de roubar.\nFunciona… por agora.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":270}],"autoTarget":null,"isFinal":false},"270":{"id":270,"text":"A madrugada chega como ladrão.\nO céu ainda é negro, mas já não é noite completa.\nLisboa não caiu inteira. Caiu em partes.\nPerto do portão, o rei mantém-se montado.\nO emissário chama-te.\n— O rei quer falar contigo. Agora.\nO rei olha-te de alto a baixo.\n— Ouvi o teu nome mais vezes esta noite do que o nome de muitos cavaleiros. Isso é perigoso.\n— Cumpro a palavra. Não vais à forca.\n— Mas ainda não és livre.\nEle aponta para dentro da cidade, para a colina.\n— Lá dentro há um homem que consegue fazer duas coisas: organizar os que restam… ou abrir-nos uma porta sem mais sangue. Quero-o vivo, se possível.\nO emissário acrescenta:\n— É alguém que fala latim. E que é respeitado dos dois lados.\nO rei fixa-te:\n— Tu és o único que entra lá e volta sem ser visto. Faz isso… e amanhã não és só “o ladrão”. Amanhã tens um lugar.","choices":[{"text":"aceitas a missão e entras já na cidade alta com escolta mínima","target":273}],"autoTarget":null,"isFinal":false},"271":{"id":271,"text":"Vais sozinho.\nEscolha certa para um ladrão. E errada para um homem cansado.\nA cidade alta espera-te.\nPassas por um beco. Um velho recolhe água. Olha-te e não grita.\nMais acima, um cão rosna. Tu atiras-lhe pão. Cala-se.\nChegas ao ponto onde as ruas apertam. Pouca luz, muitos olhos.\nVês uma porta reforçada. E uma janela baixa.\nOuves vozes em latim, misturadas com árabe.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":273},{"text":"entras pela janela baixa","target":276}],"autoTarget":null,"isFinal":false},"272":{"id":272,"text":"Pedes liberdade imediata.\nO rei olha-te como se estivesses a contar uma piada sem graça.\n— Liberdade? És ladrão. Liberdade é o teu vício.\n— Posso deixar-te ir. E amanhã alguém diz que fugiste. Depois alguém diz que traíste. E quando alguém diz, a forca volta a chamar.\n— Ou podes fazer isto… e ninguém terá coragem de inventar história sobre ti.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":273}],"autoTarget":null,"isFinal":false},"273":{"id":273,"text":"O beco em ziguezague.\nSobes por uma rua estreita, ladeada por paredes altas. Sombra densa.\nA meio do caminho, ouves um rangido. Uma janela abre-se acima.\nAlguém espreita. Não vês quem. Mas sentes o olhar.","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":274},{"text":"continuas e confias na sombra","target":276}],"autoTarget":null,"isFinal":false},"274":{"id":274,"text":"O pátio interior e a porta.\nA porta de madeira não está trancada. Empurras.\nLá dentro, um pequeno pátio com um poço seco. Escadas para um andar superior. Porta do outro lado.\nSilêncio.\nDemasiado silêncio.\nO que fazes?","choices":[],"autoTarget":275,"isFinal":false},"275":{"id":275,"text":"Telhados.\nSobes por uma escada exterior. Os degraus gemem, mas ninguém acorda.\nLá em cima, a cidade é tua.\nVês a colina. Vês tochas. Vês o brilho do rio ao longe.\nE vês, mais perto, uma clarabóia iluminada.","choices":[{"text":"saltas para o telhado da casa com clarabóia","target":276}],"autoTarget":null,"isFinal":false},"276":{"id":276,"text":"A janela baixa cede com um estalo quase inaudível.\nEntras para uma divisão onde o ar cheira a tinta, pergaminho e fumo de lamparina.\nÀ tua frente há um corredor curto. À direita, uma sala com uma mesa grande. Sobre a mesa: rolos, penas, um tinteiro, um mapa.\nÀ esquerda, uma cortina. Por trás dela, vozes em latim — baixo, tenso — e, misturado, árabe.\nOuves uma frase em latim:\n— Non adhuc… (ainda não…)\nDepois, em árabe, outra voz responde com frieza.\nO homem que o rei quer está aqui.\nUm degrau range.\nAs vozes param.\nSilêncio.","choices":[{"text":"ficas imóvel e esperas que passem","target":279}],"autoTarget":null,"isFinal":false},"277":{"id":277,"text":"Bates à porta.\nSilêncio. Depois, passos.\nA porta abre um palmo. Um olho aparece.\n— Quem és?\n— Mensagem para quem manda aqui.\n— De quem?","choices":[{"text":"segues um pressentimento e procuras uma passagem menos óbvia","target":278},{"text":"dizes “do rei”","target":285}],"autoTarget":null,"isFinal":false},"278":{"id":278,"text":"Exiges proteção escrita.\nO rei faz sinal ao emissário.\nUm clérigo aproxima-se com pergaminho e cera. Escrevem poucas linhas, secas: promessa de perdão, promessa de proteção, promessa de recompensa “adequada”.\nO emissário sela e entrega-te:\n— Isto vale alguma coisa… se estiveres vivo para o mostrar.\nO rei conclui:\n— Agora vai.","choices":[],"autoTarget":279,"isFinal":false},"279":{"id":279,"text":"Ficas imóvel.\nO silêncio alonga-se.\nUma sombra move-se atrás da cortina. A lamparina muda de ângulo. Vês a ponta de uma lâmina.\nUma voz em português, baixa:\n— Quem está aí?\nNão respondes.\nA voz continua, agora em latim:\n— Ostende te. Mostra-te.\nE depois, em árabe, uma frase curta.\nUma mão afasta a cortina um palmo. Um olho aparece.","choices":[{"text":"sais das sombras e falas","target":282}],"autoTarget":null,"isFinal":false},"280":{"id":280,"text":"Puxas a cortina.\nA cortina abre-se.\nHá três homens.\nUm é claramente o que o rei quer: meia-idade, barba cuidada, roupa simples mas limpa, postura de quem já falou com nobres.\nAo lado dele, um homem armado, duro, com olhar de soldado. E mais atrás, um terceiro, mais jovem, nervoso, segurando um punhal.\nO homem da tinta olha-te sem sobressalto.\n— Tu não és daqui — diz em português correto. — Mas conheces casas como se fosses sombra.","choices":[{"text":"dizes a verdade: “sim, e o rei quer-te vivo”","target":285}],"autoTarget":null,"isFinal":false},"281":{"id":281,"text":"Tentas recuar.\nDás um passo atrás. O chão range.\nA cortina abre-se de repente. A lâmina aparece. A luz encontra-te.\n— Lá! — diz alguém.\nÉs visto.","choices":[],"autoTarget":282,"isFinal":false},"282":{"id":282,"text":"Mostras-te e falas.\n— Não vim para matar ninguém. Vim para levar um homem vivo.\nO homem da tinta inclina a cabeça.\n— Levar-me vivo para quê?\nQue decides?","choices":[{"text":"dizes “para evitar sangue”","target":288}],"autoTarget":null,"isFinal":false},"283":{"id":283,"text":"Atacas.\nA lâmina e a sombra encontram-se.\nApanhas o homem que espreita pela cortina no pulso. A faca cai, mas ele grita.\nO homem armado reage. O jovem salta para trás.\nA sala vira luta.","choices":[],"autoTarget":284,"isFinal":false},"284":{"id":284,"text":"Armadilha atrás da mesa.\nEscondes-te atrás da mesa. Puxas um rolo para cair com barulho do outro lado.\nA cortina abre-se e a luz varre o sítio errado.\nTens um segundo de vantagem.\nVês o homem da tinta. Vês o soldado. Vês o jovem.\nNa mesa, ao teu alcance, um pequeno selo e um rolo com listas — nomes.","choices":[{"text":"agarras o rolo de nomes e foges","target":290}],"autoTarget":null,"isFinal":false},"285":{"id":285,"text":"A verdade.\n— Sim — dizes. — O rei quer-te vivo. Porque tu podes abrir Lisboa sem mais sangue.\nO homem da tinta sorri pouco.\n— Lisboa já tem sangue suficiente para encher o Tejo.\nEle olha para o soldado e diz em árabe algo que soa a “espera”. Depois fala contigo:\n— Se eu for contigo, morro de duas maneiras: morto pelos meus por traição… ou usado pelos teus como troféu.\n— O rei quer rendições locais? Então ele precisa de prometer coisa rara: vida e propriedade… pelo menos para alguns.","choices":[{"text":"aceitas e prometes conduzi-lo ao emissário com dignidade","target":292}],"autoTarget":null,"isFinal":false},"286":{"id":286,"text":"A mentira.\nDizes que trazes mensagem de rendição.\nO homem da tinta ouve-te e não te desmente logo.\n— Se és mensageiro… diz-me o nome do homem que te enviou.","choices":[{"text":"dizes “o emissário do rei”","target":294}],"autoTarget":null,"isFinal":false},"287":{"id":287,"text":"Tentas capturá-lo.\nSaltas para ele.\nO homem da tinta não entra em pânico. O soldado reage. O jovem tenta ajudar.\nConsegues agarrar o homem da tinta pelo manto… mas uma dor forte rasga-te o lado.\nEle sussurra:\n— Se me arrastares assim… ninguém negocia contigo. Só te matam.","choices":[],"autoTarget":288,"isFinal":false},"288":{"id":288,"text":"“Para evitar sangue.”\nO homem da tinta olha-te como quem pesa uma faca.\n— Evitar sangue… ou poupar trabalho ao rei?\n— Ambos.\nEle hesita.\n— Leva-me ao emissário. Não ao rei. E dá-me palavra de que não entro acorrentado.","choices":[],"autoTarget":292,"isFinal":false},"289":{"id":289,"text":"Tentas fazer refém o jovem.\nAgarra-lo pelo braço e puxas. Ele grita.\nO soldado hesita. O homem da tinta diz algo em árabe, rápido.\nO jovem debate-se. Tu apertas.\n— Deixem-me sair com ele, e ele vive.\nO homem da tinta responde:\n— Ele não é meu filho. Não negocio com reféns.\nO soldado avança.","choices":[],"autoTarget":290,"isFinal":false},"290":{"id":290,"text":"Foges com o rolo.\nAgarras o pergaminho e corres para a janela.\nSaltas.\nOs degraus da escada exterior tremem sob os teus pés.\nLá atrás, gritos em árabe.\nTens o rolo. Agora tens de o levar a quem interessa.","choices":[],"autoTarget":291,"isFinal":false},"291":{"id":291,"text":"Atacas o soldado primeiro.\nA lâmina dele encontra a tua. É mais forte. Tu és mais rápido.\nUm golpe no braço. Ele larga a arma.\nO homem da tinta recua. O jovem foge.\nAgora é só tu e ele.","choices":[],"autoTarget":292,"isFinal":false},"292":{"id":292,"text":"Conduzes o homem da tinta.\nEle não aceita cordas. Aceitas isso.\nO soldado ao lado dele avança, tenso. O homem da tinta diz-lhe algo em árabe.\n— Ele fica — diz. — Não por ameaça. Por garantia.\nSaem pela janela.\nA meio caminho, ele pára junto a uma esquina e aponta:\n— Ali em cima há homens prontos para fechar-vos outra rua. Se eu mandar parar… param.\nEle bate a uma porta, fala baixo. A porta abre. A rua que ia fechar… não fecha.\nMas ao longe, passos. Luz a aproximar-se. Patrulha.\nQual é o teu próximo passo?","choices":[{"text":"avanças depressa para o emissário","target":297}],"autoTarget":null,"isFinal":false},"293":{"id":293,"text":"Pediste prova.\nO homem da tinta hesita. Depois tira do peito um pequeno selo de cera partido.\n— Mensagem que intercetei. Vê o nome.\nTu vês. Não reconheces o nome, mas reconheces o selo. É de um nobre do teu lado.","choices":[],"autoTarget":294,"isFinal":false},"294":{"id":294,"text":"“O emissário do rei.”\nO homem da tinta inclina a cabeça.\n— Conheço esse nome. É homem de palavra… até onde a palavra serve reis.\nEle acena.\n— Leva-me a ele.","choices":[],"autoTarget":295,"isFinal":false},"295":{"id":295,"text":"Inventas um nome.\n— Sou enviado de Dom… — hesitas — …Ramiro.\nO homem da tinta não reage. Depois sorri.\n— Não conheço. E conheço todos os que mandam no acampamento cristão.\nA mentira caiu.\nA) Insistes na mentira — 286 B) Dizes a verdade — 285 C) Foges — 275","choices":[{"text":"segues em frente","target":296}],"autoTarget":null,"isFinal":false},"296":{"id":296,"text":"Arrastas o homem da tinta à força.\nEle não resiste. É pior: olha-te com pena.\n— Assim matas a única ponte que pode poupar sangue.\nTu sentes o peso das palavras. E o peso do corpo.","choices":[],"autoTarget":297,"isFinal":false},"297":{"id":297,"text":"Corres com a ponte.\nAtravessas ruas. O homem da tinta mantém o passo. O soldado segue.\nChegas a uma zona que os teus controlam parcialmente.\nUm grupo de teus homens bloqueia o caminho, excitados.\nUm deles aponta:\n— Muçulmano!\nOutro:\n— Corta-lhe a garganta!","choices":[{"text":"impões autoridade com “ordem do rei”","target":299}],"autoTarget":null,"isFinal":false},"298":{"id":298,"text":"Escondes-te e deixas passar.\nEmpurras o homem da tinta para uma sombra.\nA patrulha passa. Mercenários. Os que matam sem bandeira.\nUm olha para a sombra. Depois cospe e segue.\nO homem da tinta respira.\n— Vês? Lisboa está a partir-se por dentro.","choices":[],"autoTarget":299,"isFinal":false},"299":{"id":299,"text":"“Ordem do rei.”\nErgues a voz.\nUm homem maior dá um passo:\n— Rei? E tu és quem?\nTu não recuas:\n— Sou quem abriu o portão. E sou quem te denuncia se desobedeces.\nEle hesita. Cospe para o lado.\n— Passa.\nMas sussurra:\n— Se ele nos trair… é no teu pescoço que eu corto.","choices":[{"text":"segues direto ao emissário","target":302}],"autoTarget":null,"isFinal":false},"300":{"id":300,"text":"Suborno e promessa.\n— O rei vai pagar por rendição por sectores. Quem segurar ruas e não matar mensageiros vai ficar com a recompensa.\nMostras o saco de couro. Não abres. Só deixas ver o peso.\nO grupo abre passagem.","choices":[],"autoTarget":302,"isFinal":false},"301":{"id":301,"text":"Abrir caminho à força.\nEmpurras. O segundo levanta arma. O soldado ao lado do homem da tinta reage.\nUm grito. Alguém cai.\nO caminho está aberto… mas agora toda a rua sabe que tens um inimigo contigo.","choices":[],"autoTarget":302,"isFinal":false},"302":{"id":302,"text":"Chegas ao emissário.\nEle vê-te… e vê o homem da tinta… e vê o soldado.\nTu falas primeiro:\n— Ele pode mandar parar fechos. Pode abrir rendições locais. E fala as duas línguas.\nO homem da tinta inclina a cabeça:\n— Eu posso entregar-vos bairros sem massacre. Mas quero termos.\nO emissário respira fundo.\n— Termos… com o rei.\n— Não com o rei. Com a cidade.\nO emissário decide:\n— Primeiro, prova. Agora. Faz parar esse fecho. Aqui, à minha frente.","choices":[{"text":"segues com eles para o teste","target":305}],"autoTarget":null,"isFinal":false},"303":{"id":303,"text":"“Marcas” os homens.\nAproximas-te do que falou e falas baixo:\n— Guarda o nome. Amanhã, quando o rei perguntar quem ajudou, quero saber dizer o teu.\nEle não responde. Mas não esquece.","choices":[],"autoTarget":305,"isFinal":false},"305":{"id":305,"text":"O teste.\nAtravessam uma rua onde a resistência ainda é um nó.\nO homem da tinta avança sem levantar arma. Levanta a voz — em árabe.\nUma ordem. Uma frase curta.\nUm homem inimigo hesita. Depois responde. Depois grita para os outros.\nAs mãos que seguravam traves baixam.\nO emissário olha para ti. Agora já não é teoria.\nUm dos teus, excitado, levanta um machado e corre para a linha inimiga.\nEscolhe depressa.","choices":[{"text":"corres e travas o teu homem antes do golpe","target":308}],"autoTarget":null,"isFinal":false},"306":{"id":306,"text":"Pediste escolta extra.\nO emissário manda mais dois homens. O grupo fica mais lento, mais visível.\nQuando chegam à rua do teste, o inimigo vê “força” e fecha-se.\nA prova falha antes de começar.","choices":[],"autoTarget":307,"isFinal":false},"307":{"id":307,"text":"Levas o homem da tinta diretamente ao rei.\nAtravessas o cordão de guardas.\nO rei está montado, a falar com um cavaleiro.\nQuando te vê, franze a testa.\n— Isto é o homem?\n— É.\nO homem da tinta fala primeiro:\n— Posso render bairros. Mas preciso de garantias.\nO rei escuta. Depois:\n— Quem és tu para me pedires garantias?\n— Alguém que a cidade ainda ouve.","choices":[],"autoTarget":308,"isFinal":false},"308":{"id":308,"text":"Travas o machado.\nCorres e apanhas o homem pelo ombro.\n— NÃO! — gritas.\nEle vira-se, furioso:\n— Estás a proteger inimigos!\n— Estou a proteger a rendição.\nO emissário aproxima-se:\n— Por ordem do rei: ninguém ataca nesta rua.\nO homem recua, humilhado.\nA linha inimiga mantém-se em espera.\nO homem da tinta olha para ti:\n— Agora vês como se segura uma cidade.","choices":[],"autoTarget":310,"isFinal":false},"309":{"id":309,"text":"FINAL ALTERNATIVO — “A PONTE QUEBRADA”\nO machado hesita no ar. Se cai, não há ponte que se reconstrua. E tu sabes disso.\nMesmo assim, não te mexes.\nO machado cai.\nO primeiro sangue quebra a pausa.\nA rua volta a ser guerra.\nO homem da tinta fecha os olhos.\nA ponte parte-se.\nA cidade continua a cair… mas com muito mais morte.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"310":{"id":310,"text":"O acordo nasce.\nDe volta ao estandarte, o emissário reúne dois capitães e um clérigo.\nO homem da tinta fala:\n— Eu posso mandar baixar armas em três zonas hoje. Outras duas, talvez amanhã. Mas só se houver garantia de vida para famílias e para quem largar armas.\nO emissário vira-se para ti:\n— Tu. Vais ser a sombra que leva mensagens.\nO homem da tinta acrescenta:\n— E eu não vou sozinho. Vou com alguém que os meus reconheçam. Um homem de lei. Um alfaqui.\nO emissário acena:\n— Há um velho alfaqui conhecido na cidade. Se o encontrares e o trouxeres… as ruas seguem.","choices":[{"text":"vais à madrassa/mesquita","target":311}],"autoTarget":null,"isFinal":false},"311":{"id":311,"text":"A madrassa.\nA meio caminho da colina, os pátios são mais limpos e a cal branca denuncia passos. Há uma fonte, e um silêncio que não combina com guerra.\nSubes por ruas estreitas. Chegas a um edifício modesto, com um pátio interior e uma fonte.\nÀ porta, dois homens com bastões.\nUm deles fala em árabe. O homem da tinta traduz:\n— Perguntam quem és.","choices":[{"text":"pedes entrada em nome de “negociação para salvar famílias”","target":314}],"autoTarget":null,"isFinal":false},"312":{"id":312,"text":"Casa do mercador.\nO mercador influente mora numa casa maior, com portas fortes.\nHá sinais de pânico: móveis encostados, trancas improvisadas, janelas fechadas com tábuas.\nBates à porta.\nUma voz pergunta:\n— Quem?\nO mercador abre só uma fenda na portinhola. Um olho avalia-te. Ao fundo, por trás de ti, a colina recorta-se. — Se a torre de vigia lá em cima acender fogo, a Alcáçova acorda inteira — murmura. — E quando acorda, as ruas fecham-se. — E a madrassa? — perguntas, baixo. — A sul, perto do poço grande. Vai leve. Os velhos não gostam de ferro a bater na pedra.","choices":[{"text":"dizes “o emissário do rei”","target":316}],"autoTarget":null,"isFinal":false},"313":{"id":313,"text":"Caça ao mensageiro.\nEscolhes um cruzamento onde três ruas se encontram.\nNão esperas muito. Um rapaz aparece, magro, com um rolo preso à cintura.\nEle pára ao ver-te. Vai virar.\nTu já estás em movimento.","choices":[{"text":"o apanhas vivo e o interrogas","target":319}],"autoTarget":null,"isFinal":false},"314":{"id":314,"text":"Pedes entrada para salvar vidas.\nO homem da tinta fala primeiro. Os guardas abrem a porta.\nUm velho aparece à sombra de uma arcada. Barba branca curta, olhos que já viram a cidade mudar de dono.\n— Precisamos do alfaqui.\nO velho responde:\n— “O alfaqui não recebe homens de espada.”\nTu olhas para a tua lâmina.\n— Não vim para cortar. Vim para impedir que se corte demais.\nO velho mede-te.\n— Prova.\nNesse instante, gritos ao longe. Um grupo teu persegue dois homens que correm para este pátio.\nO que fazes?","choices":[{"text":"corres para travar os teus antes que profanem o pátio","target":322}],"autoTarget":null,"isFinal":false},"315":{"id":315,"text":"Infiltras-te pela parede lateral.\nEscalas e desces para dentro.\nUm guarda vê-te e ergue o bastão:\n— Haram!\nA palavra é alarme.","choices":[],"autoTarget":316,"isFinal":false},"316":{"id":316,"text":"“Envio do emissário do rei.”\nA porta abre mais um palmo… e pára.\nA voz fica fria:\n— O rei de fora não manda aqui dentro.\nA porta começa a fechar.","choices":[{"text":"colocas o pé e forças conversa","target":326}],"autoTarget":null,"isFinal":false},"317":{"id":317,"text":"Mostras o homem da tinta.\nA porta abre mais. O mercador aparece, cara pálida, olhos a medir risco.\nEle reconhece o homem da tinta. Fala baixo em árabe.\nDepois:\n— Se isto for armadilha, a minha casa arde.\n— Se isto não resultar, a cidade arde inteira.\nEle abre a porta.\nLá dentro, num recanto do pátio, um velho sentado numa almofada, mãos juntas.\nO alfaqui abre os olhos devagar.\n— Tu és a sombra que abriu a porta — diz em português. — Por que razão eu devia acreditar numa sombra?","choices":[{"text":"dizes a verdade crua: “porque a alternativa é massacre”","target":327}],"autoTarget":null,"isFinal":false},"318":{"id":318,"text":"Forças entrada.\nTentas empurrar a porta. A casa responde com barulho.\nO mercador grita. Alguém chama guardas.\nO homem da tinta agarra-te no braço:\n— Assim matas a ponte.","choices":[],"autoTarget":319,"isFinal":false},"319":{"id":319,"text":"Apanhas o mensageiro.\nO rapaz debate-se. Tu encostas-lhe a lâmina.\n— Onde está o alfaqui?\nEle treme.\n— Casa do mercador… ou madrassa… às vezes…\nTu arrancas o rolo. Vês selos. Um símbolo simples: um círculo com marca — sinal de “lei”.\nO rapaz olha-te:\n— Se eu não entregar isso… matam-me.","choices":[],"autoTarget":320,"isFinal":false},"320":{"id":320,"text":"Segues o mensageiro.\nEle corre por ruas onde ninguém quer estar.\nChega finalmente a uma casa maior — a casa do mercador — e bate no ritmo certo.\nEntra.\nTens confirmação.","choices":[],"autoTarget":321,"isFinal":false},"321":{"id":321,"text":"Matas e levas o rolo.\nO golpe é rápido. O rolo cai nas tuas mãos.\nUma mulher grita de uma janela.\nAgora não és mensageiro. És assassino na rua.","choices":[],"autoTarget":322,"isFinal":false},"322":{"id":322,"text":"Travas os teus na porta sagrada.\nSais do pátio. Vês os teus a correr atrás de dois homens aterrados.\nUm dos teus levanta a espada.\nTu entras entre eles.\n— NÃO AQUI!\nEle trava a meio palmo.\nAo fundo, um homem de cruz e capa suja — capelão do cerco. A presença dele acalma os teus.\nA espada baixa.\nTu voltas ao pátio. O velho alfaqui viu tudo.\nEle acena, uma vez.\n— Palavra.","choices":[],"autoTarget":332,"isFinal":false},"323":{"id":323,"text":"O homem da tinta manda parar.\nEle dá ordem em árabe, firme. Os homens na rua hesitam.\nMas um dos teus não entende, não quer entender, e avança.","choices":[],"autoTarget":324,"isFinal":false},"324":{"id":324,"text":"FINAL ALTERNATIVO — “A PORTA PROFANADA”\nDeixas acontecer.\nA espada cai. O sangue toca pedra sagrada.\nO alfaqui levanta-se devagar e aponta para a porta:\n— Sai.\nA ponte quebra.\nFIM","choices":[],"autoTarget":null,"isFinal":true},"325":{"id":325,"text":"Corres por dentro.\nTentas avançar, mas as sombras têm dono. Um bastão acerta-te no ombro.\nO homem da tinta tenta explicar, mas a confusão já está feita.","choices":[],"autoTarget":326,"isFinal":false},"326":{"id":326,"text":"Forças conversa.\n— O rei quer evitar massacre. Tu queres viver. O alfaqui pode ser a ponte.\nO mercador hesita.\n— Prova — diz ele. — Dá-me um nome que eu conheça.\nTu dizes o nome do homem da tinta. A porta abre mais um palmo.","choices":[],"autoTarget":327,"isFinal":false},"327":{"id":327,"text":"A verdade crua.\n— Porque a alternativa é massacre. Tu sabes isso. Eu sei isso. O alfaqui sabe isso.\nO velho inclina a cabeça.\n— Sombra que fala verdade. Raro.\nEle levanta-se.\n— Eu vou contigo.","choices":[],"autoTarget":332,"isFinal":false},"328":{"id":328,"text":"O homem da tinta fala.\nFala em árabe, com respeito. Nomeia o alfaqui. Nomeia bairros. Nomeia a palavra “rendição” como faca de dois gumes.\nO alfaqui ouve.\nDepois:\n— Eu vou. Mas não como refém. Vou como juiz.","choices":[],"autoTarget":332,"isFinal":false},"329":{"id":329,"text":"Ameaças.\nO alfaqui olha-te com tristeza.\n— Então já não és sombra. És eco.\nEle não se levanta.","choices":[],"autoTarget":331,"isFinal":false},"331":{"id":331,"text":"Levas o rapaz contigo.\nEle treme, mas guia-te.\nChegam à casa do mercador. Bate no ritmo certo. A porta abre.\nO rapaz entra e desaparece.\nTu entras atrás.","choices":[],"autoTarget":332,"isFinal":false},"332":{"id":332,"text":"O alfaqui levanta-se.\n— Eu vou contigo — diz. — Mas não vou como refém. Vou como juiz.\nEle aponta para o teu peito:\n— E tu vais responder pela tua palavra. Se os teus quebrarem o acordo… eu declaro-vos sem honra.\nQue decides?","choices":[{"text":"sais por ruas largas e rápidas","target":333}],"autoTarget":null,"isFinal":false},"333":{"id":333,"text":"Ruas largas.\nÉ mais rápido. E mais visível.\nUm grupo de cavaleiros cruzados cruza-se convosco. Um deles reconhece o alfaqui e franze a testa.\n— É ele? O juiz?\n— É. Vem negociar rendição.\nO cavaleiro hesita. Depois acena e segue.\nPassaram.","choices":[],"autoTarget":363,"isFinal":false},"334":{"id":334,"text":"Becos e sombras.\nSais da madrassa. O alfaqui caminha ao teu lado, sem pressa.\nOs becos apertam. Num cruzamento estreito, o alfaqui aponta para uma porta baixa.\n— Por aqui.\nEntras num corredor interior que liga a dois pátios.\nNo segundo pátio, ouves passos. Muitos. Passos de quem sabe para onde vai.\nO soldado inimigo (garantia) sussurra em árabe. O homem da tinta traduz:\n— “Eles cheiram acordo. Vêm cortar a língua antes que fale.”","choices":[{"text":"tentas atravessar o pátio correndo","target":336}],"autoTarget":null,"isFinal":false},"335":{"id":335,"text":"Escudo sagrado.\nO capelão aceita. Caminha ao lado do alfaqui, a cruz ao peito.\nOs homens do teu lado recuam quando o vêem. Os inimigos hesitam.\nNinguém quer matar um homem de Deus.\nO caminho fica mais fácil.","choices":[],"autoTarget":363,"isFinal":false},"336":{"id":336,"text":"Corrida pelo pátio.\nCorres. O alfaqui corre atrás, mais rápido do que esperavas para um velho. O homem da tinta segue. O soldado fecha a retaguarda.\nUma tocha vira a esquina e a luz apanha-vos.\n— Ali! — grita alguém em árabe.\nE, do outro lado do pátio, surge um homem em português:\n— Pára!\nNão é ordem de inimigo. É ordem de “aliado” com ambição.\nEle tem dois homens com ele.","choices":[{"text":"enfrentas os homens em português para abrir passagem","target":339}],"autoTarget":null,"isFinal":false},"337":{"id":337,"text":"Telhados com um velho.\nAjudas o alfaqui a subir por uma escada exterior. Ele agarra-se com dignidade, mas os joelhos traem-no. Tu puxas. O homem da tinta empurra. O soldado sobe por último, ágil.\nNo telhado, o vento corta.\nVês uma ponte improvisada entre dois telhados — uma prancha de madeira deixada por obras antigas. Dá para atravessar, mas balança.\nAtrás, ouves passos a subir.","choices":[{"text":"atravessas a prancha já, mesmo com risco de queda","target":340}],"autoTarget":null,"isFinal":false},"338":{"id":338,"text":"Emboscada no corredor.\nPuxas o alfaqui para uma sombra do corredor e fazes sinal: silêncio total.\nOs passos entram no pátio. Ouvem-se vozes:\n— Onde foram? — em árabe. — Vê ali — em português.\nDois lados. Dois perigos.\nDeixas passar o primeiro homem. Depois o segundo.\nAtacas o terceiro — o mais atrás.\nEle cai com som surdo.\nOs outros viram-se.","choices":[{"text":"lutas para atrasar e salvar o alfaqui","target":343}],"autoTarget":null,"isFinal":false},"339":{"id":339,"text":"Traição interna no pátio.\nO homem em português dá um passo à frente, espada curta na mão.\n— Entrega o velho. Agora.\nTu reconheces o tipo: não é capitão grande. É cão de capitães.\n— Ele vai falar com o emissário — dizes. — É ordem.\nEle sorri.\n— Ordem? Ordem é o que fica escrito quando tu já estiveres morto.\nEle avança.\nO soldado inimigo ao teu lado hesita.\nO alfaqui fala pela primeira vez, em português:\n— Um homem que teme palavras… teme justiça.\nO traidor fica vermelho e ataca.","choices":[],"autoTarget":340,"isFinal":false},"340":{"id":340,"text":"A prancha.\nA prancha balança quando o alfaqui pisa. Tu seguras-lhe o braço. O homem da tinta segura o outro.\nA meio, um grito lá em baixo:\n— NO TELHADO!\nUma seta sobe e crava-se na madeira a um palmo do pé do alfaqui.\nEle não pára.\nOutra seta passa.\nTu sentes a tua ferida puxar, mas seguras.\nChegam ao outro lado.\nNo telhado seguinte há uma clarabóia aberta e uma escada interior.\nAtrás, os perseguidores estão quase a chegar à prancha.","choices":[{"text":"desces já pela clarabóia","target":347}],"autoTarget":null,"isFinal":false},"341":{"id":341,"text":"Ficas para atrasar.\nFazes sinal ao alfaqui:\n— Vai.\nEle atravessa a prancha devagar. O homem da tinta vai com ele. O soldado fica contigo.\nOs passos chegam ao telhado atrás. Três homens aparecem. Um tem arco.\nO primeiro avança. Tu empurras para o vazio.\nO segundo avança. O arco tenta apontar para o alfaqui.\nO soldado inimigo ao teu lado move-se e bate no arqueiro com o cabo da arma, desviando o tiro.\nQual é o teu próximo passo?","choices":[{"text":"atravessas a prancha agora e foges","target":347}],"autoTarget":null,"isFinal":false},"342":{"id":342,"text":"Outra rota nos telhados.\nProcuras uma rota mais segura. Encontras um ponto onde dois telhados quase se tocam.\nÉ mais seguro… mas é mais lento.\nE o lento, nesta noite, é inimigo.","choices":[],"autoTarget":343,"isFinal":false},"343":{"id":343,"text":"Lutas para atrasar.\nEnfrentas os perseguidores no corredor. O alfaqui foge com o homem da tinta.\nConsegues derrubar dois. O terceiro foge.\nVoltas-te. O alfaqui já não está à vista.\nVais para a 344 (encontras-te com eles no ponto combinado).","choices":[{"text":"segues em frente","target":344}],"autoTarget":null,"isFinal":false},"344":{"id":344,"text":"Foges com o alfaqui.\nAtravessas a porta do fundo. Um beco. Depois outro.\nO alfaqui está ofegante, mas vivo.\n— Quem te ensinou a correr assim? — perguntas.\nEle sorri, mesmo cansado.\n— A cidade.","choices":[],"autoTarget":347,"isFinal":false},"345":{"id":345,"text":"Resolves o traidor.\nA luta é curta. Ele é ambicioso, não é guerreiro.\nCai.\nO soldado inimigo olha para o corpo.\n— Isto traz problemas.\n— Isto já eram problemas.","choices":[],"autoTarget":346,"isFinal":false},"346":{"id":346,"text":"Tentas capturá-lo vivo.\nAgarras-lhe o braço e torces. Ele grita.\n— Quem te mandou?\n— Vai-te foder, ladrão.\nNão vai falar.","choices":[],"autoTarget":347,"isFinal":false},"347":{"id":347,"text":"Lá dentro, o ar é mais quente. Sinal de gente — e de perigo mais perto.\nDesces pela clarabóia.\nEntras numa divisão escura que cheira a palha e azeite. A clarabóia fecha-se atrás de ti com um rangido.\nLá fora, os passos no telhado.\nO alfaqui respira fundo.\n— A cidade também tem telhados… mas poucos homens sabem andar nela.\nAtravessam a casa em silêncio. Saem por uma porta lateral.\nA saída dá para uma rua onde a luz de tochas é tua e deles.\nVês um grupo de homens do teu lado, armados, e do outro lado da rua uma patrulha inimiga a observar.\nO alfaqui pára.\n— Se eu chegar vivo ao emissário, posso fazer render um bairro.\nUm dos teus homens reconhece-te, reconhece o velho ao teu lado:\n— Quem é esse?","choices":[{"text":"respondes alto com “ordem do rei”","target":352}],"autoTarget":null,"isFinal":false},"348":{"id":348,"text":"Cortas a prancha.\nA madeira parte-se com um estalo seco. A perseguição fica do outro lado.\nPor agora.","choices":[],"autoTarget":348,"isFinal":false},"349":{"id":349,"text":"Emboscada no telhado.\nEsperas. O primeiro homem atravessa. Derrubas.\nO segundo hesita. Recua.\nGanhaste tempo.","choices":[],"autoTarget":349,"isFinal":false},"350":{"id":350,"text":"Ficas mais um instante.\nO segundo homem avança. Tu desvias e empurras.\nEle cai. Grita.\nLá em baixo, mais vozes.\nFoges.","choices":[],"autoTarget":350,"isFinal":false},"351":{"id":351,"text":"Livras-te do soldado.\nNão confias nele. Um golpe rápido.\nEle cai sem som.\nAgora estás sozinho com o alfaqui e o homem da tinta.","choices":[],"autoTarget":352,"isFinal":false},"352":{"id":352,"text":"Autoridade.\n— ORDEM DO REI. ESTE HOMEM VEM COMIGO.\nAlguns homens endireitam-se.\nUm dos teus, jovem, aponta a lâmina para o alfaqui:\n— Ele é deles.\nO alfaqui levanta a mão:\n— Eu sou da cidade. E a cidade quer viver.\nA patrulha inimiga do outro lado da rua ouve. Um inimigo dá um passo.","choices":[{"text":"mandas os teus recuar e abres espaço para o alfaqui falar com a patrulha inimiga","target":355}],"autoTarget":null,"isFinal":false},"353":{"id":353,"text":"Sombra.\nPuxas o alfaqui para a borda da rua e tentas passar.\nUm homem do teu lado bloqueia-te.\n— Tu és o ladrão… e esse velho não é dos nossos.","choices":[],"autoTarget":354,"isFinal":false},"354":{"id":354,"text":"A palavra do alfaqui.\nO velho dá um passo à frente.\nFala primeiro em árabe, para a patrulha:\n— Parem.\nA patrulha hesita.\nDepois vira-se para os teus, em português:\n— Se me matarem, Lisboa luta até ao último. Se me ouvirem, Lisboa rende um bairro e salva famílias.\nUm fanático — do teu lado — começa a avançar com a lâmina erguida.","choices":[{"text":"te colocas à frente e travas o fanático","target":359}],"autoTarget":null,"isFinal":false},"355":{"id":355,"text":"Falas com a patrulha inimiga.\nFazes sinal aos teus para recuar dois passos.\nO alfaqui avança para o meio da rua. A patrulha inimiga avança também.\nO homem da patrulha diz algo em árabe. O alfaqui responde.\nTu não entendes tudo, mas entendes o essencial: nomes e garantias. “Vida”. “Casas”. “Crianças”.\nO inimigo hesita.\nUm dos teus homens murmura:\n— Isto é traição.","choices":[{"text":"olhas para trás e intimidas o murmurador","target":361}],"autoTarget":null,"isFinal":false},"356":{"id":356,"text":"Arrancas rumo ao emissário.\nNão dás tempo à rua para decidir. Puxas o alfaqui e atravessas, rápido.\nO inimigo observa, mas não ataca.\nDo teu lado, gritos, mas ficam para trás.\nChegas ao estandarte.","choices":[],"autoTarget":363,"isFinal":false},"357":{"id":357,"text":"Capturas a patrulha.\nAtacas primeiro. Os teus avançam.\nA patrulha inimiga recua. Um cai. Outro foge.\nA rua vira guerra em miniatura.\nO alfaqui fecha os olhos.\n— Assim… não há bairro que renda.\nEscolhe depressa.","choices":[{"text":"ainda assim levas o alfaqui ao emissário","target":363}],"autoTarget":null,"isFinal":false},"358":{"id":358,"text":"Violência para passar.\nDerrubas o homem que te bloqueia. Ele cai.\nO inimigo do outro lado vê confusão e decide atacar: uma seta passa e crava-se na parede.\nOs teus respondem. A rua explode.\nO alfaqui tropeça. Tu agarras-lhe o braço.","choices":[],"autoTarget":359,"isFinal":false},"359":{"id":359,"text":"Travas o fanático com o corpo.\nPões-te à frente e apanhas o braço dele.\nEle cospe-te na cara:\n— Vendido.\nTu respondes:\n— Vivo.\nO emissário aparece ao fundo. Dois guardas aproximam-se.\nO fanático recua.","choices":[],"autoTarget":363,"isFinal":false},"360":{"id":360,"text":"Deixas o soldado tratar disso.\nO soldado inimigo dá um passo e, sem hesitar, bate no fanático com o cabo da arma. O fanático cai.\nOs teus homens ficam furiosos: “inimigo a tocar num dos nossos!”\nO alfaqui grita:\n— PAREM!\nMas já é tarde.","choices":[],"autoTarget":361,"isFinal":false},"361":{"id":361,"text":"Cortas a pólvora.\nViras-te e encaras o murmurador.\n— Diz isso mais alto e morres.\nEle engole as palavras.\nA patrulha inimiga ouve o alfaqui e baixa
